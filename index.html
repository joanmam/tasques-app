      });
    const unsubCL=db.collection('completionLogs').where('ownerId','==',user.uid)
      .onSnapshot(snap=>{setCompletionLogs(snap.docs.map(d=>({id:d.id,...d.data()})));});
    // Tasques d'altres usuaris on m'han convidat amb "Convida a informar" (només lectura)
    const unsubW=db.collection('tasks').where('watchers','array-contains',user.uid)
      .onSnapshot(snap=>{setWatchedTasks(snap.docs.map(d=>({id:d.id,...d.data()})));});
    // Directori d'usuaris registrats (per al desplegable de "Convida a informar")
    const unsubU=db.collection('users')
      .onSnapshot(snap=>{setAllUsers(snap.docs.map(d=>({uid:d.id,email:d.data().email})).filter(u=>u.email));});
    // Directori de contactes (sincronitzat des de Notion, veure scripts/*contacts*.py). Privat per
    // usuari (ownerId) — cal filtrar per uid perquè les regles de Firestore permetin la lectura.
    const unsubC=db.collection('contacts').where('ownerId','==',user.uid)
      .onSnapshot(snap=>{setContacts(snap.docs.map(d=>({id:d.id,...d.data()})));}, ()=>{});
    return()=>{unsubT();unsubL1();unsubL2();unsubS();unsubCL();unsubW();unsubU();unsubC();unsubA();sharedTasksUnsub();};
  },[user]);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
    save('tq_dark',darkMode);
  },[darkMode]);

  useEffect(()=>{
    if (!user) return;
    const h = e => {
      if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
      if (e.key==='n'){e.preventDefault();setShowModal(true);}
      if (e.key===' '&&selectedTask){e.preventDefault();toggleStatus(selectedTask.id,selectedTask.status);}
      if (e.key==='Escape'){setSelectedTask(null);setShowModal(false);}
    };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[user,selectedTask]);

  useEffect(()=>{
    if (selectedTask) {
      const fresh = tasks.find(t=>t.id===selectedTask.id);
      if (fresh) setSelectedTask(fresh);
    }
  },[tasks]);

  // Notification service
  useEffect(()=>{
    if (!user||tasks.length===0) return;
    const checkReminders = () => {
      if (!('Notification' in window)||Notification.permission!=='granted') return;
      const now = new Date();
      const notifiedKey = `tq_notif_${user.uid}`;
      const notified = load(notifiedKey,[]);
      tasks.forEach(task=>{
        if (!task.reminderMinutes||task.status==='completada'||!task.endDate) return;
        const endTime = task.endTime||'23:59';
        const endDt = new Date(`${task.endDate}T${endTime}`);
        const remDt = new Date(endDt.getTime() - task.reminderMinutes*60000);
        const diff = now - remDt;
        if (diff>=0 && diff<90000) {
          const nid = `${task.id}_${remDt.getTime()}`;
          if (!notified.includes(nid)) {
            const label = task.reminderMinutes<60
              ? `${task.reminderMinutes} min`
              : task.reminderMinutes===60?'1 hora':'2 hores';
            new Notification(`⏰ ${task.title}`,{body:`Recordatori: vença en ${label}`});
            save(notifiedKey,[...notified.slice(-100),nid]);
          }
        }
      });
    };
    const hasReminders = tasks.some(t=>t.reminderMinutes>0&&t.status!=='completada');
    if (hasReminders && 'Notification' in window && Notification.permission==='default') {
      Notification.requestPermission();
    }
    checkReminders();
    const iv = setInterval(checkReminders,60000);
    return ()=>clearInterval(iv);
  },[user,tasks]);

  if (user===undefined) return <div className="loading-screen"><div className="spinner"/><span style={{fontSize:13,color:'var(--text3)'}}>Carregant...</span></div>;
  if (!user) return <LoginScreen/>;

  // ── Parser de veu en català ──────────────────────────────────────────────
  const parseVoiceInput = (text) => {
    let title = text;
    const lower = text.toLowerCase();
    let endDate = '', endTime = '';
    const now = new Date();
    const addDays = n => { const d=new Date(now); d.setDate(d.getDate()+n); return ymd(d); };
    const dayNames = ['diumenge','dilluns','dimarts','dimecres','dijous','divendres','dissabte'];
    const dayNamesEs = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const monthNames = ['gener','febrer','març','abril','maig','juny','juliol','agost','setembre','octubre','novembre','desembre'];
    const monthNamesEs = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    // Hora (català + castellà)
    const timeRules = [
      [/a les (\d{1,2})[h:](\d{2})/, m=>`${m[1].padStart(2,'0')}:${m[2]}`],
      [/a las (\d{1,2})[h:](\d{2})/, m=>`${m[1].padStart(2,'0')}:${m[2]}`],
      [/a les (\d{1,2})h/,           m=>`${m[1].padStart(2,'0')}:00`],
      [/a las (\d{1,2})h/,           m=>`${m[1].padStart(2,'0')}:00`],
      [/a les (\d{1,2})/,            m=>`${m[1].padStart(2,'0')}:00`],
      [/a las (\d{1,2})/,            m=>`${m[1].padStart(2,'0')}:00`],
      [/al mat[íi]|por la mañana/,   ()=>'09:00'],
      [/a migdia|a mediodía/,        ()=>'12:00'],
      [/a la tarda|por la tarde/,    ()=>'15:00'],
      [/al vespre|al atardecer/,     ()=>'19:00'],
      [/a la nit|por la noche/,      ()=>'21:00'],
    ];
    for (const [re,fn] of timeRules) {
      const m = lower.match(re);
      if (m) { endTime=fn(m); title=title.replace(new RegExp(re.source,'i'),''); break; }
    }
    // Data (català + castellà)
    const allDays = [...dayNames,...dayNamesEs];
    const dateRules = [
      [/\bavui\b|\bhoy\b/,                ()=>addDays(0)],
      [/\bdem[àa] passat\b|\bpasado mañana\b/, ()=>addDays(2)],
      [/\bdem[àa](?![a-zà-ÿ])|\bmañana\b/, ()=>addDays(1)],
      [/la setmana que ve|la semana que viene|la próxima semana/, ()=>addDays(7)],
      [new RegExp(`(?:el proper |el |el próximo )?(${allDays.join('|')})`), m=>{
        const raw=m[1]; const di=dayNames.indexOf(raw)!==-1?dayNames.indexOf(raw):dayNamesEs.indexOf(raw);
        const diff=(di-now.getDay()+7)%7||7; return addDays(diff);
      }],
      [/el (\d{1,2}) de ([a-zà-ÿ]+)/, m=>{
        const mi=monthNames.indexOf(m[2])!==-1?monthNames.indexOf(m[2]):monthNamesEs.indexOf(m[2]);
        if(mi===-1) return null;
        const d=new Date(now.getFullYear(),mi,parseInt(m[1]));
        if(d<now) d.setFullYear(d.getFullYear()+1);
        return ymd(d);
      }],
    ];
    for (const [re,fn] of dateRules) {
      const m = lower.match(re);
      if (m) { const r=fn(m); if(r){endDate=r; title=title.replace(new RegExp(re.source,'i'),'');} break; }
    }
    title = title.replace(/\s+/g,' ').replace(/^[\s,]+|[\s,]+$/g,'').trim();
    title = title.charAt(0).toUpperCase()+title.slice(1);
    return {title, endDate, endTime};
  };

  const startVoice = () => {
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if (!SR) { showToast('⚠ El navegador no suporta reconeixement de veu'); return; }
    const rec = new SR();
    rec.lang = 'ca-ES';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    setVoiceListening(true);
    rec.onresult = e => {
      setVoiceListening(false);
      const transcript = e.results[0][0].transcript;
      const parsed = parseVoiceInput(transcript);
      const inboxList = lists.find(l=>(l.name||'').trim().toLowerCase()==='inbox');
      const listId = inboxList ? inboxList.id : (lists[0]?.id||'');
      setVoicePreFill({...parsed, title: parsed.title||transcript, listId});
      setShowModal(true);
    };
    rec.onerror = () => { setVoiceListening(false); showToast('⚠ Error de reconeixement'); };
    rec.onend   = () => setVoiceListening(false);
    rec.start();
  };

  // Crea/actualitza/esborra l'event a cada calendari de Google segons GCAL_SYNC_RULES
  // (una tasca amb l'etiqueta corresponent es publica al calendari d'aquella regla).
  // Nomes fa res si Google Calendar esta connectat. prevEventIds: {tag: eventId, ...}
  const syncTaggedCalendars = async (taskId, taskData, prevEventIds) => {
    if (!gcalToken) return;
    const tags = taskData.tags||[];
    const prev = prevEventIds||{};
    const patch = {};
    for (const rule of GCAL_SYNC_RULES) {
      const hasTag = tags.includes(rule.tag);
      const prevId = prev[rule.tag]||null;
      try {
        if (hasTag && (taskData.startDate||taskData.endDate)) {
          const body = taskToGcalEvent(taskData);
          const ev = await upsertGcalEvent(gcalToken, rule.calendarId, prevId, body);
          if (ev.id !== prevId) patch[`gcalSyncEventIds.${rule.tag}`] = ev.id;
        } else if (!hasTag && prevId) {
          await deleteGcalEvent(gcalToken, rule.calendarId, prevId);
          patch[`gcalSyncEventIds.${rule.tag}`] = firebase.firestore.FieldValue.delete();
        }
      } catch (e) {
        console.error(`Sync calendari (${rule.tag}):`, e);
        showToast(`⚠ No s'ha pogut sincronitzar amb el calendari "${rule.tag}"`);
      }
    }
    if (Object.keys(patch).length) await db.collection('tasks').doc(taskId).update(patch);
  };
  const addTask = async data => {
    setSyncing(true);
    data = applyAuditGdpTemplate(data, lists);
    if (data.recurrence && data.recurrence !== 'none') {
      // Genera totes les instàncies de la sèrie
      const seriesId = db.collection('tasks').doc().id;
      const seriesStart = data.endDate || today;
      const limitDt = new Date(seriesStart + 'T12:00');
      if (data.recurrenceEndDate) {
        // Fins a la data de fi de la sèrie
      } else {
        limitDt.setFullYear(limitDt.getFullYear() + 1); // màxim 1 any
      }
      const limitStr = data.recurrenceEndDate || ymd(limitDt);
      // Genera les dates
      const dates = [];
      let cur = seriesStart;
      let safety = 0;
      while (cur <= limitStr && safety < 400) {
        dates.push(cur);
        const nx = nextOccurrence(cur, data.recurrence);
        if (!nx) break;
        cur = nx; safety++;
      }
      // Crea en batch (màx 500 per batch)
      let batch = db.batch();
      dates.forEach((date, i) => {
        if (i > 0 && i % 499 === 0) { batch.commit(); batch = db.batch(); }
        const ref = db.collection('tasks').doc();
        batch.set(ref, {
          ...data, endDate: date, seriesId,
          ownerId: user.uid, ownerEmail: user.email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
      await batch.commit();
      showToast(`✓ Sèrie creada: ${dates.length} ocurrències`);
      // Nota: les series recurrents no es publiquen al calendari familiar (evita crear-hi moltes ocurrències).
    } else {
      const fullData = {...data,ownerId:user.uid,ownerEmail:user.email,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
      const ref = await db.collection('tasks').add(fullData);
      syncTaggedCalendars(ref.id, data, null);
    }
    setSyncing(false); setShowModal(false);
  };
  const updateTask = async updated => {
    // 'comments' es gestiona a part (arrayUnion) per no sobreescriure missatges d'altres.
    const {id,comments,...data} = updated;
    setSyncing(true);
    await db.collection('tasks').doc(id).update(data);
    syncTaggedCalendars(id, data, data.gcalSyncEventIds||{});
    setSyncing(false); setSelectedTask(updated);
  };
  const deleteTask = async id => {
    const task = tasks.find(t=>t.id===id);
    if (task?.gcalSyncEventIds && gcalToken) {
      for (const rule of GCAL_SYNC_RULES) {
        const evId = task.gcalSyncEventIds[rule.tag];
        if (!evId) continue;
        try { await deleteGcalEvent(gcalToken, rule.calendarId, evId); }
        catch(e) { console.error(`Sync calendari (${rule.tag}, esborrat):`, e); }
      }
    }
    await db.collection('tasks').doc(id).delete();
    if (selectedTask?.id===id) setSelectedTask(null);
  };
  const canDeleteTask = task => {
    const list = lists.find(l=>l.id===task?.listId);
    if (list) return list.ownerId===user.uid;  // llista: nomes el propietari de la llista pot esborrar
    return task?.ownerId===user.uid;            // sense llista: nomes el propietari de la tasca (mai l'assignat)
  };
  // Edicio completa (tots els camps): propietari de la tasca, o membre d'una llista compartida.
  // L'assignat NOMES pot canviar l'estat (pendent/completada), no la resta de camps.
  const canFullyEdit = task => {
    if (!task) return false;
    if (task.ownerId===user.uid) return true;
    const list = lists.find(l=>l.id===task.listId);
    return !!list && (list.sharedWith||[]).includes(user.uid);
  };
  const requestDelete = task => {
    if (task.seriesId) setDeleteConfirm(task);
    else setSingleDeleteConfirm(task);
  };
  const deleteSeries = async (task,mode) => {
    setSyncing(true);
    try {
      if (mode==='this') {
        await deleteTask(task.id);
      } else {
        const snap = await db.collection('tasks').where('seriesId','==',task.seriesId).where('ownerId','==',user.uid).get();
        if (snap.empty) {
          showToast('⚠ No s\'ha trobat cap tasca de la sèrie per eliminar');
        } else {
          const batch = db.batch();
          let n = 0;
          snap.docs.forEach(d=>{
            const data=d.data();
            if (mode==='all' || (mode==='future' && (data.endDate||'')>=(task.endDate||''))) {
              batch.delete(d.ref); n++;
            }
          });
          if (n===0) {
            showToast('⚠ No hi havia cap ocurrència que complís el criteri');
          } else {
            await batch.commit();
            showToast(`✓ ${n} ocurrència${n>1?'s':''} eliminada${n>1?'s':''}`);
          }
        }
        if (selectedTask?.seriesId===task.seriesId) setSelectedTask(null);
      }
    } catch (e) {
      console.error('Error eliminant la sèrie:', e);
      showToast(`⚠ No s'ha pogut eliminar: ${e.message||e}`);
    } finally {
      setSyncing(false); setDeleteConfirm(null);
    }
  };
  const toggleStatus = async (id,current) => {
    const task = tasks.find(t=>t.id===id); if (!task) return;
    if (current!=='completada') {
      if (task.tracked && task.ownerId===user.uid) { // el seguiment nomes es del propietari; l'assignat no en genera
        await db.collection('completionLogs').add({
          ownerId:user.uid, taskId:id,
          seriesId:task.seriesId||null,
          taskTitle:task.title,
          date:task.endDate||today,
          completedAt:firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      await db.collection('tasks').doc(id).update({status:'completada'});
    } else {
      await db.collection('tasks').doc(id).update({status:'pendent'});
    }
  };
  const delayTask = async (task, type) => {
    const base = task.endDate||today;
    const baseTime = task.endTime || new Date().toTimeString().slice(0,5);
    if (type==='1h') {
      const dt = new Date(`${base}T${baseTime}`);
      dt.setHours(dt.getHours()+1);
      await db.collection('tasks').doc(task.id).update({
        endDate: ymd(dt),
        endTime: dt.toTimeString().slice(0,5)
      });
    } else {
      const dt = new Date(base+'T12:00');
      dt.setDate(dt.getDate()+1);
      await db.collection('tasks').doc(task.id).update({endDate:ymd(dt)});
    }
  };
  // Mou una tasca a una data concreta (arrossegant-la al calendari) sense canviar l'hora.
  // Manté la durada si la tasca ocupa diversos dies (startDate!=endDate).
  const moveTaskToDate = async (task, newDateStr) => {
    const anchor = task.endDate || task.startDate;
    if (!anchor || newDateStr === anchor) return;
    const delta = Math.round(
      (new Date(newDateStr+'T12:00') - new Date(anchor+'T12:00')) / 86400000
    );
    if (!delta) return;
    const shift = d => { const x=new Date(d+'T12:00'); x.setDate(x.getDate()+delta); return ymd(x); };
    const upd = {};
    if (task.endDate)   upd.endDate   = shift(task.endDate);
    if (task.startDate) upd.startDate = shift(task.startDate);
    await db.collection('tasks').doc(task.id).update(upd);
  };
  // Actualitza directament les dates d'inici/fi d'una tasca (des del Gantt, arrossegant la barra).
  const updateTaskDates = async (taskId, patch) => {
    const upd = {};
    if (patch.startDate!==undefined) upd.startDate = patch.startDate;
    if (patch.endDate!==undefined)   upd.endDate   = patch.endDate;
    if (!Object.keys(upd).length) return;
    await db.collection('tasks').doc(taskId).update(upd);
  };
  const toggleTrack = async task => {
    const newVal = !task.tracked;
    if (task.seriesId) {
      // Actualitza totes les instàncies de la sèrie
      const snap = await db.collection('tasks').where('seriesId','==',task.seriesId).get();
      const batch = db.batch();
      snap.docs.forEach(d => batch.update(d.ref, {tracked: newVal}));
      await batch.commit();
    } else {
      await db.collection('tasks').doc(task.id).update({tracked: newVal});
    }
  };
  const addList = async data => {
    // Els "Camps per defecte" són globals i no cal copiar-los a cada llista;
    // les llistes noves comencen sense camps propis (es poden afegir des de la configuració de la llista).
    await db.collection('lists').add({...data,fields:[],sharedWith:[],sharedWithEmails:{},ownerId:user.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    setShowListModal(false);
  };
  const updateList = async (id,data) => {
    await db.collection('lists').doc(id).update(data); setEditingList(null);
  };
  const deleteList = async id => {
    await db.collection('lists').doc(id).delete();
    const batch = db.batch();
    tasks.filter(t=>t.listId===id).forEach(t=>batch.delete(db.collection('tasks').doc(t.id)));
    await batch.commit();
    if (selectedList===id) setSelectedList('all');
  };
  const saveDefaultFields = async fields => {
    await db.collection('userSettings').doc(user.uid).set({defaultFields:fields},{merge:true});
    setShowDefaultFields(false);
  };
  const shareList = async (listId, email) => {
    email = email.trim().toLowerCase();
    const snap = await db.collection('users').where('email','==',email).get();
    if (snap.empty) return 'No existeix cap usuari registrat amb aquest correu.';
    const targetUid = snap.docs[0].id;
    if (targetUid===user.uid) return 'No et pots compartir la llista a tu mateix.';
    const updates = {sharedWith: firebase.firestore.FieldValue.arrayUnion(targetUid)};
    updates[`sharedWithEmails.${targetUid}`] = email;
    await db.collection('lists').doc(listId).update(updates);
    showToast('✓ Llista compartida amb '+email);
    return null;
  };
  const unshareList = async (listId, targetUid) => {
    const updates = {sharedWith: firebase.firestore.FieldValue.arrayRemove(targetUid)};
    updates[`sharedWithEmails.${targetUid}`] = firebase.firestore.FieldValue.delete();
    await db.collection('lists').doc(listId).update(updates);
  };
  // "Convida a informar": convida algú per email a veure una tasca concreta en mode només lectura
  // (diferent de compartir una llista sencera, que permet editar).
  const inviteToTask = async (taskId, email) => {
    email = email.trim().toLowerCase();
    const snap = await db.collection('users').where('email','==',email).get();
    if (snap.empty) return 'No existeix cap usuari registrat amb aquest correu.';
    const targetUid = snap.docs[0].id;
    if (targetUid===user.uid) return 'No et pots convidar a tu mateix.';
    const updates = {watchers: firebase.firestore.FieldValue.arrayUnion(targetUid)};
    updates[`watcherEmails.${targetUid}`] = email;
    await db.collection('tasks').doc(taskId).update(updates);
    showToast('✓ Persona convidada a informar-se: '+email);
    return null;
  };
  const removeWatcher = async (taskId, targetUid) => {
    const updates = {watchers: firebase.firestore.FieldValue.arrayRemove(targetUid)};
    updates[`watcherEmails.${targetUid}`] = firebase.firestore.FieldValue.delete();
    await db.collection('tasks').doc(taskId).update(updates);
  };
  // Assignar una tasca a una altra persona: pot completar-la, pero nomes el creador la pot editar.
  const assignTask = async (taskId, email) => {
    email = email.trim().toLowerCase();
    const snap = await db.collection('users').where('email','==',email).get();
    if (snap.empty) return 'No existeix cap usuari registrat amb aquest correu.';
    const targetUid = snap.docs[0].id;
    if (targetUid===user.uid) return 'No et pots assignar una tasca a tu mateix.';
    await db.collection('tasks').doc(taskId).update({assigneeId:targetUid,assigneeEmail:email});
    showToast('✓ Tasca assignada a '+email);
    return null;
  };
  const unassignTask = async taskId => {
    await db.collection('tasks').doc(taskId).update({
      assigneeId: firebase.firestore.FieldValue.delete(),
      assigneeEmail: firebase.firestore.FieldValue.delete()
    });
  };

  const allTags = [...new Set(tasks.flatMap(t=>t.tags||[]))];
  // Vistes especials de "Informat per" / "Assignades a" / "Assignades per" (no son llistes reals)
  const isWatchedView = typeof selectedList==='string' && selectedList.startsWith('watched:');
  const isAssignedToView = typeof selectedList==='string' && selectedList.startsWith('assignedTo:'); // jo he assignat a algu (vist des del creador)
  const isAssignedByView = typeof selectedList==='string' && selectedList.startsWith('assignedBy:'); // m'han assignat a mi (vist des de l'assignat)
  const watchedOwnerId = isWatchedView ? selectedList.slice(8) : null;
  const assignedToUid = isAssignedToView ? selectedList.slice(11) : null;
  const assignedByUid = isAssignedByView ? selectedList.slice(11) : null;
  const isPseudoList = isWatchedView || isAssignedToView || isAssignedByView;
  // Camps personalitzats de la llista seleccionada que es poden filtrar (select/checkbox)
  const isSpecificList = !DATE_QUICK_VIEWS.includes(selectedList)&&selectedList!=='all'&&selectedList!=='seguiment'&&!isPseudoList;
  const customFilterFields = isSpecificList
    ? (lists.find(l=>l.id===selectedList)?.fields||[]).filter(f=>f.type==='select'||f.type==='checkbox')
    : [];
  // Camps per defecte filtrables (select/checkbox), aplicables a totes les vistes des de la barra lateral
  const defaultFilterFields = (defaultFields||[]).filter(f=>f.type==='select'||f.type==='checkbox');
  // Grups de llistes (Professional/Personal/...) per organitzar la barra lateral i filtrar
  const listGroupOf = listId => lists.find(l=>l.id===listId)?.group || 'Sense grup';
  const presentGroups = [...new Set(lists.map(l=>l.group||'Sense grup'))];
  const orderedGroups = [...LIST_GROUPS.filter(g=>presentGroups.includes(g)), ...presentGroups.filter(g=>!LIST_GROUPS.includes(g))];
  // El filtre de grup només s'aplica a vistes generals (Totes, Avui, Demà...), no quan ja s'ha triat una llista concreta
  const matchesGroup = t => isSpecificList || selectedGroup==='all' || listGroupOf(t.listId)===selectedGroup;
  // Per a les vistes "Pròxims 3/7 dies": la tasca hi entra si algun dia del seu rang [inici,fi] cau dins
  // la finestra [avui, maxStr], no només si el seu dia de venciment hi cau (així una tasca de diversos dies
  // que comença dins la finestra però acaba més tard també hi apareix, als dies intermedis que li toquin).
  const inDateWindow = (t, maxStr) => {
    if (t.seriesId) { const d=t.endDate; return !!d && d>=today && d<=maxStr; }
    const s = t.startDate||t.endDate, e = t.endDate||t.startDate;
    if (!s && !e) return false;
    return s<=maxStr && e>=today;
  };
  const filtered = tasks.filter(t=>{
    if (selectedList==='today'){
      // Per a ocurrències de tasques repetides, només compta la data de l'ocurrència (endDate),
      // ja que totes comparteixen la mateixa startDate original.
      if (t.seriesId) { if (t.endDate!==today) return false; }
      else if (t.startDate!==today&&t.endDate!==today) return false;
    }
    else if (selectedList==='tomorrow'){ if (taskDueStr(t)!==tomorrowStr) return false; }
    else if (selectedList==='next3'){ if(!inDateWindow(t,threeDayLaterStr)) return false; }
    else if (selectedList==='next7'){ if(!inDateWindow(t,weekLaterStr)) return false; }
    else if (typeof selectedList==='string'&&selectedList.startsWith('assignedTo:')){
      const uid=selectedList.slice(11); if(t.ownerId!==user.uid||t.assigneeId!==uid) return false;
    }
    else if (typeof selectedList==='string'&&selectedList.startsWith('assignedBy:')){
      const uid=selectedList.slice(11); if(t.assigneeId!==user.uid||t.ownerId!==uid) return false;
    }
    else if (selectedList!=='all'&&selectedList!=='seguiment'){if(t.listId!==selectedList)return false;}
    if (!matchesGroup(t)) return false;
    if (!matchesSearch(t)) return false;
    if (filterStatus!=='all'&&t.status!==filterStatus) return false;
    if (filterPriority!=='all'&&t.priority!==filterPriority) return false;
    if (filterTag!=='all'&&!(t.tags||[]).includes(filterTag)) return false;
    for (const f of customFilterFields) {
      const fv = filterCustom[f.id];
      if (fv===undefined||fv==='all') continue;
      const cv = (t.customValues||{})[f.id];
      if (f.type==='checkbox') {
        if (String(!!cv)!==fv) return false;
      } else {
        if ((cv??'')!==fv) return false;
      }
    }
    // Filtres pels "camps per defecte" (s'apliquen a totes les vistes, des de la barra lateral)
    for (const f of defaultFilterFields) {
      const fv = filterCustom[f.id];
      if (fv===undefined||fv==='all') continue;
      const cv = (t.customValues||{})[f.id];
      if (f.type==='checkbox') {
        if (String(!!cv)!==fv) return false;
      } else {
        if ((cv??'')!==fv) return false;
      }
    }
    return true;
  });
  // Ordena per dia d'inici ascendent (i per hora d'inici com a desempat).
  // Excepció: en una tasca recurrent cal mirar endDate (startDate es identic a
  // totes les ocurrencies de la serie i no serveix per ordenar-les entre elles).
  const sortDateStr = t => t.seriesId ? (t.endDate||t.startDate||'') : (t.startDate||t.endDate||'');
  const byStartDate = (a,b) => {
    const da=sortDateStr(a); const db=sortDateStr(b);
    if (da!==db) return da<db?-1:1;
    const ta=a.startTime||a.endTime||''; const tb=b.startTime||b.endTime||'';
    return ta<tb?-1:ta>tb?1:0;
  };
  const pendents    = filtered.filter(t=>t.status!=='completada').sort(byStartDate);
  const completades = filtered.filter(t=>t.status==='completada').sort(byStartDate);
  const countFor = id => tasks.filter(t=>{
    if (t.status==='completada') return false;
    if (!matchesGroup(t)) return false;
    if (id==='today') return t.seriesId?t.endDate===today:(t.startDate===today||t.endDate===today);
    if (id==='tomorrow') return taskDueStr(t)===tomorrowStr;
    if (id==='next3') return inDateWindow(t,threeDayLaterStr);
    if (id==='next7') return inDateWindow(t,weekLaterStr);
    return t.listId===id;
  }).length;
  // Resolt l'email d'un uid: primer l'ownerEmail guardat a la tasca (tasques noves),
  // si no, el cerca al directori d'usuaris (tasques antigues sense ownerEmail); si tampoc, l'uid en cru.
  const emailForUid = (uid, knownEmail) => knownEmail || allUsers.find(u=>u.uid===uid)?.email || uid;
  const listName = selectedList==='all'?'Totes les tasques'
    :selectedList==='today'?'Avui'
    :selectedList==='tomorrow'?'Demà'
    :selectedList==='next3'?'Pròxims 3 dies'
    :selectedList==='next7'?'Pròxims 7 dies'
    :selectedList==='seguiment'?'Seguiment'
    :isWatchedView?`Informat per ${emailForUid(watchedOwnerId, watchedTasks.find(t=>t.ownerId===watchedOwnerId)?.ownerEmail)}`
    :isAssignedToView?`Assignades a ${emailForUid(assignedToUid, tasks.find(t=>t.assigneeId===assignedToUid)?.assigneeEmail)}`
    :isAssignedByView?`Assignades per ${emailForUid(assignedByUid, tasks.find(t=>t.ownerId===assignedByUid)?.ownerEmail)}`
    :lists.find(l=>l.id===selectedList)?.name??'';

  return (
    <>
      <div style={{display:'flex',height:'100vh',overflow:'hidden',width:'100%'}}>
        <>
        <div className={`sidebar-backdrop${sidebarOpen?' open':''}`} onClick={()=>setSidebarOpen(false)}/>
        <aside className={`sidebar${sidebarOpen?' open':''}`}>
          <div className="sidebar-header">
            <span className="sidebar-logo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
              </svg>
              Tasques
              <span style={{fontSize:9,color:'var(--text3)',fontWeight:400,marginLeft:2}}>v4.8</span>
              <span className={`sync-dot ${syncing?'syncing':''}`} title={syncing?'Sincronitzant...':'Sincronitzat'}/>
            </span>
            <button className="btn btn-ghost btn-icon" style={{color:'var(--text2)',padding:5}} onClick={()=>setDarkMode(d=>!d)}>
              {darkMode?Ic.sun:Ic.moon}
            </button>
          </div>
          <div className="sidebar-user">
            <div className="sidebar-user-top">
              <div className="sidebar-avatar">{(user.email?.[0]??'?').toUpperCase()}</div>
              <span className="sidebar-user-name" title={user.email}>{user.email}</span>
            </div>
            <button className="btn-logout" onClick={()=>auth.signOut()}>{Ic.logout} Tancar sessió</button>
            <button className="btn-logout" style={{marginTop:6,justifyContent:'space-between',
                color:pushOn?'var(--success)':'var(--text2)',
                borderColor:pushOn?'var(--success)':'var(--border)',
                background:pushOn?'rgba(79,190,150,.10)':'transparent'}}
              onClick={async()=>{
                if(!pushSupported()){ showToast('⚠ Aquest navegador no admet notificacions push'); return; }
                if(pushOn){
                  try { await unsubscribeFromPush(user.uid); setPushOn(false); showToast('Notificacions desactivades'); }
                  catch(err){ showToast('⚠ No s\'han pogut desactivar les notificacions'); }
                } else {
                  try {
                    await subscribeToPush(user.uid, user.email);
                    setPushOn(true);
                    showToast('✓ Notificacions activades');
                  } catch(err){
                    showToast(err.message==='denied' ? '⚠ Has de permetre les notificacions al navegador' : '⚠ No s\'han pogut activar les notificacions');
                  }
                }
              }}>
              <span style={{display:'inline-flex',alignItems:'center',gap:7}}>{Ic.bell} {pushOn?'Notificacions actives':'Notificacions desactivades'}</span>
              <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10,background:pushOn?'var(--success)':'var(--bg3)',color:pushOn?'#fff':'var(--text3)'}}>{pushOn?'ON':'OFF'}</span>
            </button>
          </div>
          <div className="sidebar-section">
            <SidebarItem icon={Ic.inbox} label="Totes" count={tasks.filter(t=>t.status!=='completada').length}
              active={selectedList==='all'} onClick={()=>{setSelectedList('all');setSidebarOpen(false)}}/>
            <SidebarItem icon={Ic.today} label="Avui" count={countFor('today')}
              active={selectedList==='today'} onClick={()=>{setSelectedList('today');setSidebarOpen(false)}}/>
            <SidebarItem icon={Ic.calendar} label="Demà" count={countFor('tomorrow')}
              active={selectedList==='tomorrow'} onClick={()=>{setSelectedList('tomorrow');setSidebarOpen(false)}}/>
            <SidebarItem icon={Ic.calendar} label="Pròxims 3 dies" count={countFor('next3')}
              active={selectedList==='next3'} onClick={()=>{setSelectedList('next3');setSidebarOpen(false)}}/>
            <SidebarItem icon={Ic.calendar} label="Pròxims 7 dies" count={countFor('next7')}
              active={selectedList==='next7'} onClick={()=>{setSelectedList('next7');setSidebarOpen(false)}}/>
            <SidebarItem icon={Ic.chart} label="Seguiment"
              active={selectedList==='seguiment'} onClick={()=>{setSelectedList('seguiment');setSidebarOpen(false)}}/>
          </div>
          <div className="sidebar-section">
            <div className="sidebar-section-title">Llistes</div>
            {orderedGroups.length>1 && (
              <div className="group-chips">
                <button className={`group-chip ${selectedGroup==='all'?'active':''}`} onClick={()=>setSelectedGroup('all')}>Tots</button>
                {orderedGroups.map(g=>(
                  <button key={g} className={`group-chip ${selectedGroup===g?'active':''}`} onClick={()=>setSelectedGroup(g===selectedGroup?'all':g)}>{g}</button>
                ))}
              </div>
            )}
            {orderedGroups.filter(g=>selectedGroup==='all'||selectedGroup===g).map(g=>(
              <div key={g}>
                {orderedGroups.length>1 && <div className="sidebar-group-label">{g}</div>}
                {lists.filter(l=>(l.group||'Sense grup')===g).map(l=>{
                  const isOwner=l.ownerId===user.uid;
                  const hasShares=isOwner&&(l.sharedWith||[]).length>0;
                  return (
                    <SidebarItem key={l.id} dot={l.color} label={l.name} count={countFor(l.id)}
                      sharedIcon={!isOwner?'recv':hasShares?'sent':null}
                      active={selectedList===l.id} onClick={()=>{setSelectedList(l.id);setSidebarOpen(false)}}
                      onSettings={()=>setEditingList(l)} onDelete={isOwner?()=>deleteList(l.id):null}/>
                  );
                })}
              </div>
            ))}
            <button className="add-list-btn" onClick={()=>setShowListModal(true)}>
              <span style={{fontSize:16}}>+</span> Nova llista
            </button>
          </div>
          {allTags.length>0 && (
            <div className="sidebar-section">
              <div className="sidebar-section-title">Etiquetes</div>
              {allTags.map(tag=>{
                const c=tagColor(tag);
                return <SidebarItem key={tag} dot={c.text} label={tag}
                  active={filterTag===tag} onClick={()=>setFilterTag(ft=>ft===tag?'all':tag)}/>;
              })}
            </div>
          )}
          {watchedTasks.length>0 && (
            <div className="sidebar-section">
              <div className="sidebar-section-title">Informat per</div>
              {[...new Set(watchedTasks.map(t=>t.ownerId))].map(ownerId=>{
                const ownerEmail = emailForUid(ownerId, watchedTasks.find(t=>t.ownerId===ownerId)?.ownerEmail);
                const count = watchedTasks.filter(t=>t.ownerId===ownerId&&t.status!=='completada').length;
                return (
                  <SidebarItem key={ownerId} icon={Ic.eye} label={ownerEmail} count={count}
                    active={selectedList===`watched:${ownerId}`}
                    onClick={()=>{setSelectedList(`watched:${ownerId}`);setSidebarOpen(false)}}/>
                );
              })}
            </div>
          )}
          {(() => {
            const assignedOutTasks = tasks.filter(t=>t.ownerId===user.uid && t.assigneeId);
            if (!assignedOutTasks.length) return null;
            return (
              <div className="sidebar-section">
                <div className="sidebar-section-title">Assignades a</div>
                {[...new Set(assignedOutTasks.map(t=>t.assigneeId))].map(uid=>{
                  const email = emailForUid(uid, assignedOutTasks.find(t=>t.assigneeId===uid)?.assigneeEmail);
                  const count = assignedOutTasks.filter(t=>t.assigneeId===uid&&t.status!=='completada').length;
                  return (
                    <SidebarItem key={uid} icon={Ic.person} label={email} count={count}
                      active={selectedList===`assignedTo:${uid}`}
                      onClick={()=>{setSelectedList(`assignedTo:${uid}`);setSidebarOpen(false)}}/>
                  );
                })}
              </div>
            );
          })()}
          {(() => {
            const assignedToMeTasks = tasks.filter(t=>t.assigneeId===user.uid && t.ownerId!==user.uid);
            if (!assignedToMeTasks.length) return null;
            return (
              <div className="sidebar-section">
                <div className="sidebar-section-title">Assignades per</div>
                {[...new Set(assignedToMeTasks.map(t=>t.ownerId))].map(uid=>{
                  const email = emailForUid(uid, assignedToMeTasks.find(t=>t.ownerId===uid)?.ownerEmail);
                  const count = assignedToMeTasks.filter(t=>t.ownerId===uid&&t.status!=='completada').length;
                  return (
                    <SidebarItem key={uid} icon={Ic.person} label={email} count={count}
                      active={selectedList===`assignedBy:${uid}`}
                      onClick={()=>{setSelectedList(`assignedBy:${uid}`);setSidebarOpen(false)}}/>
                  );
                })}
              </div>
            );
          })()}
          <div style={{flex:1}}/>
          <div style={{padding:'10px 8px',borderTop:'1px solid var(--border)'}}>
            <button className="sidebar-item" style={{width:'100%',color:'var(--text3)'}}
              onClick={()=>setShowDefaultFields(true)}>
              <span style={{width:14,height:14}}>{Ic.gear}</span>
              <span style={{fontSize:12}}>Camps per defecte</span>
            </button>
            <button className="sidebar-item" style={{width:'100%',color:gcalToken?'var(--success)':'var(--text3)'}}
              onClick={gcalToken?disconnectGoogleCalendar:connectGoogleCalendar}
              title={gcalToken?'Desconnectar Google Calendar':'Mostra el teu Google Calendar al calendari'}>
              <span style={{width:14,height:14}}>{Ic.calendar}</span>
              <span style={{fontSize:12}}>{gcalToken?'Google Calendar connectat':'Connectar Google Calendar'}</span>
            </button>
            {gcalToken && (
              <button className="sidebar-item" style={{width:'100%',color:'var(--text3)'}}
                onClick={()=>setShowGcalSettings(true)}
                title="Configurar calendaris de Google a mostrar">
                <span style={{width:14,height:14}}>{Ic.gear}</span>
                <span style={{fontSize:12}}>Calendaris de Google</span>
              </button>
            )}
            <div style={{padding:'8px 10px',fontSize:'10px',color:'var(--text3)'}}>
              <span className="kbd">n</span> nova &nbsp;·&nbsp; <span className="kbd">espai</span> completar
            </div>
          </div>
        </aside>
        </>

        <div className="main">
          <div className="topbar">
            <button className="hamburger" onClick={()=>setSidebarOpen(o=>!o)}>☰</button>
            <div className="topbar-title">{listName}</div>
            {selectedList!=='seguiment' && !isWatchedView && <>
              <div className="view-toggle">
                <button className={`view-btn ${view==='list'?'active':''}`} onClick={()=>setView('list')}>
                  <span style={{width:13,height:13}}>{Ic.list}</span> Llista
                </button>
                <button className={`view-btn ${view==='calendar'?'active':''}`} onClick={()=>setView('calendar')}>
                  <span style={{width:13,height:13}}>{Ic.calendar}</span> Calendari
                </button>
                <button className={`view-btn ${view==='matrix'?'active':''}`} onClick={()=>setView('matrix')}>
                  <span style={{width:13,height:13}}>{Ic.chart}</span> Matriu
                </button>
                <button className={`view-btn ${view==='gantt'?'active':''}`} onClick={()=>setView('gantt')}>
                  <span style={{width:13,height:13}}>{Ic.gantt}</span> Gantt
                </button>
                <button className={`view-btn ${view==='subtasks'?'active':''}`} onClick={()=>setView('subtasks')}>
                  <span style={{width:13,height:13}}>{Ic.check}</span> Subtasques
                </button>
              </div>
              <div className="search-box">
                <span className="search-box-icon">{Ic.search}</span>
                <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                  placeholder="Cerca per títol..." />
                {searchQuery&&(
                  <button className="search-box-clear" title="Esborra la cerca" onClick={()=>setSearchQuery('')}>{Ic.x}</button>
                )}
              </div>
              <button className={`btn btn-ghost btn-icon ${voiceListening?'voice-active':''}`}
                onClick={startVoice} title="Nova tasca per veu"
                style={{color:voiceListening?'var(--danger)':'var(--text2)',fontSize:18,padding:'6px 10px'}}>
                🎤
              </button>
              <button className="btn btn-primary" onClick={()=>{setVoicePreFill(null);setShowModal(true);}}>{Ic.plus} Nova tasca</button>
            </>}
          </div>

          {selectedList!=='seguiment' && !isWatchedView && (
            <button className={`fab-voice ${voiceListening?'listening':''}`} title="Nova tasca per veu" aria-label="Nova tasca per veu"
              onClick={startVoice}>🎤</button>
          )}
          {selectedList!=='seguiment' && !isWatchedView && (
            <button className="fab-new" title="Nova tasca" aria-label="Nova tasca"
              onClick={()=>{setVoicePreFill(null);setShowModal(true);}}>{Ic.plus}</button>
          )}

          {selectedList==='seguiment' ? (
            <SeguimentView tasks={tasks} completionLogs={completionLogs} lists={lists}/>
          ) : isWatchedView ? (
            <div className="content">
              {(() => {
                const ownerTasks = watchedTasks.filter(t=>t.ownerId===watchedOwnerId);
                const pend = ownerTasks.filter(t=>t.status!=='completada');
                const comp = ownerTasks.filter(t=>t.status==='completada');
                if (!ownerTasks.length) return <div className="empty-state">{Ic.list}<p>Cap tasca d'aquest usuari.</p></div>;
                return (<>
                  {pend.map(t=><TaskItem key={t.id} task={t} lists={lists} readOnly
                    selected={selectedTask?.id===t.id} onClick={()=>setSelectedTask(t)}/>)}
                  {comp.length>0 && <>
                    <div className="date-group-header">
                      <span className="dgh-dot" style={{background:'var(--success)'}}/>
                      Completades
                      <span className="dgh-count">{comp.length}</span>
                    </div>
                    {comp.map(t=><TaskItem key={t.id} task={t} lists={lists} readOnly
                      selected={selectedTask?.id===t.id} onClick={()=>setSelectedTask(t)}/>)}
                  </>}
                </>);
              })()}
            </div>
          ) : (<>
            {view!=='gantt' && <div className="filters">
              <span style={{fontSize:'11px',color:'var(--text3)'}}>Estat:</span>
              {[['all','Totes'],['pendent','Pendent'],['en-curs','En curs'],['completada','Completada']].map(([v,l])=>(
                <button key={v} className={`filter-chip ${filterStatus===v?'active':''}`} onClick={()=>setFilterStatus(v)}>{l}</button>
              ))}
              <span className="filter-sep">|</span>
              <span style={{fontSize:'11px',color:'var(--text3)'}}>Prioritat:</span>
              {[['all','Totes'],['alta','Alta'],['mitjana','Mitjana'],['baixa','Baixa']].map(([v,l])=>(
                <button key={v} className={`filter-chip ${filterPriority===v?'active':''}`} onClick={()=>setFilterPriority(v)}>{l}</button>
              ))}
              {defaultFilterFields.map(f=>(
                <React.Fragment key={f.id}>
                  <span className="filter-sep">|</span>
                  <span style={{fontSize:'11px',color:'var(--text3)'}}>{f.name}:</span>
                  <button className={`filter-chip ${(filterCustom[f.id]??'all')==='all'?'active':''}`}
                    onClick={()=>setFilterCustom(fc=>({...fc,[f.id]:'all'}))}>Totes</button>
                  {(f.type==='checkbox'?['true','false']:(f.options||[])).map(opt=>(
                    <button key={opt} className={`filter-chip ${filterCustom[f.id]===opt?'active':''}`}
                      onClick={()=>setFilterCustom(fc=>({...fc,[f.id]:fc[f.id]===opt?'all':opt}))}>
                      {f.type==='checkbox'?(opt==='true'?'Sí':'No'):opt}

                  ))}
                </React.Fragment>
              ))}
              {customFilterFields.length>0 && (
                <>
                  <span className="filter-sep">|</span>
                  <div className="more-filters" ref={moreFiltersRef}>
                    <button className={`filter-chip ${Object.values(filterCustom).some(v=>v&&v!=='all')?'active':''}`}
                      onClick={()=>setShowMoreFilters(s=>!s)}>
                      Més filtres {Object.values(filterCustom).filter(v=>v&&v!=='all').length>0?`(${Object.values(filterCustom).filter(v=>v&&v!=='all').length})`:'▾'}
                    </button>
                    {showMoreFilters && (
                      <div className="more-filters-panel">
                        {customFilterFields.map(f=>(
                          <div key={f.id}>
                            <label>{f.name}</label>
                            {f.type==='checkbox' ? (
                              <select className="input" value={filterCustom[f.id]??'all'} onChange={e=>setFilterCustom(fc=>({...fc,[f.id]:e.target.value}))}>
                                <option value="all">Tots</option>
                                <option value="true">Sí</option>
                                <option value="false">No</option>
                              </select>
                            ) : (
                              <select className="input" value={filterCustom[f.id]??'all'} onChange={e=>setFilterCustom(fc=>({...fc,[f.id]:e.target.value}))}>
                                <option value="all">Tots</option>
                                {(f.options||[]).map(o=><option key={o} value={o}>{o}</option>)}

                        {Object.values(filterCustom).some(v=>v&&v!=='all') && (
                          <button className="btn btn-ghost" style={{fontSize:11,padding:'4px 10px'}} onClick={()=>setFilterCustom({})}>Netejar</button>
                        )}

                    )}

                </>
              )}
            </div>}
            {view==='gantt' ? (
              <GanttView tasks={tasks} lists={lists}
                defaultList={isSpecificList?selectedList:'all'}

                currentUserUid={user.uid} matchesSearch={matchesSearch}
                selectedTask={selectedTask} onSelectTask={setSelectedTask} onUpdateDates={updateTaskDates}/>
            ) : view==='calendar' ? (
              <CalendarView tasks={filtered} lists={lists} selectedTask={selectedTask} onSelectTask={setSelectedTask} onMoveTask={moveTaskToDate}
                gcalToken={gcalToken} gcalEvents={gcalEvents} setGcalEvents={setGcalEvents} gcalError={gcalError} setGcalError={setGcalError} gcalCalendars={gcalCalendars}/>
            ) : view==='matrix' ? (
              <MatrixView tasks={filtered} lists={lists} defaultFields={defaultFields} selectedTask={selectedTask} onSelectTask={setSelectedTask}/>
            ) : view==='subtasks' ? (
              <SubtasksView tasks={filtered} lists={lists} selectedTask={selectedTask} onSelectTask={setSelectedTask} onUpdateTask={updateTask}/>
            ) : (
            <div className="content">
              {pendents.length===0&&completades.length===0&&(
                <div className="empty-state">{Ic.list}<p>Cap tasca. Crea-ne una amb <span className="kbd">n</span></p></div>
              )}
              {(selectedList==='next3'||selectedList==='next7'?
                // Agrupa per dia concret (Avui / Demà / nom del dia), evitant l'etiqueta confusa "Pròxims 7 dies".
                // Les tasques de diversos dies apareixen repetides a cada dia intermedi que travessin dins la finestra.
                buildDayGroups(pendents, selectedList==='next3'?threeDayLaterStr:weekLaterStr)
                :
                // Les tasques de diversos dies apareixen repetides a cada bloc (Avui/Demà/Pròxims 7 dies/Més endavant)
                // pel qual passi algun dels seus dies intermedis.
                DATE_GROUPS.map(grp=>({key:grp.key,label:grp.label,dot:grp.dot,
                  tasks:pendents.filter(t=>taskDateCategories(t).includes(grp.key))}))
              ).map(grp=>{
                const grpTasks = grp.tasks;
                if (!grpTasks.length) return null;
                return (
                  <div key={grp.key}>
                    <div className="date-group-header">
                      <span className="dgh-dot" style={{background:grp.dot}}/>
                      {grp.label}
                      <span className="dgh-count">{grpTasks.length}</span>
                    </div>
                    {grpTasks.map(t=><TaskItem key={t.id} task={t} lists={lists} nextOcc={nextOccurrenceFor(t)}
                      selected={selectedTask?.id===t.id} onClick={()=>setSelectedTask(t)}
                      onToggle={()=>toggleStatus(t.id,t.status)} onDelete={canDeleteTask(t)?()=>requestDelete(t):null}
                      onDelay={(task,type)=>delayTask(task,type)} onTrack={toggleTrack} assignedOnly={!canFullyEdit(t)}/>)}
                  </div>
                );
              })}
              {completades.length>0&&<>
                <div className="date-group-header">
                  <span className="dgh-dot" style={{background:'var(--success)'}}/>
                  Completades
                  <span className="dgh-count">{completades.length}</span>
                </div>
                {completades.map(t=><TaskItem key={t.id} task={t} lists={lists} nextOcc={nextOccurrenceFor(t)}
                  selected={selectedTask?.id===t.id} onClick={()=>setSelectedTask(t)}
                  onToggle={()=>toggleStatus(t.id,t.status)} onDelete={canDeleteTask(t)?()=>requestDelete(t):null}
                  onDelay={(task,type)=>delayTask(task,type)} onTrack={toggleTrack} assignedOnly={!canFullyEdit(t)}/>)}
              </>}
            </div>
            )}
          </>)}
        </div>

        {selectedTask&&(
          (isWatchedView||(!canFullyEdit(selectedTask)&&(selectedTask.watchers||[]).includes(user.uid))) ? (
            <WatchedTaskPanel task={selectedTask} lists={lists} allUsers={allUsers}
              onClose={()=>setSelectedTask(null)}
              onRemoveSelf={async()=>{await removeWatcher(selectedTask.id,user.uid);setSelectedTask(null);}}/>
          ) : (!canFullyEdit(selectedTask)&&selectedTask.assigneeId===user.uid) ? (
            <AssignedTaskPanel task={selectedTask} lists={lists} allUsers={allUsers}
              onClose={()=>setSelectedTask(null)}
              onToggleStatus={()=>toggleStatus(selectedTask.id,selectedTask.status)}/>
          ) : (
            <DetailPanel task={selectedTask} lists={lists} defaultFields={defaultFields} allTags={allTags}
              currentUserUid={user.uid} currentUserEmail={user.email}
              onUpdate={updateTask} onDelete={canDeleteTask(selectedTask)?()=>requestDelete(selectedTask):null}
              onClose={()=>setSelectedTask(null)} onDelay={delayTask}
              onInviteWatcher={inviteToTask} onRemoveWatcher={removeWatcher}
              onAssign={assignTask} onUnassign={unassignTask} allUsers={allUsers} contacts={contacts}/>
          )
        )}
      </div>

      {showModal&&<NewTaskModal lists={lists} defaultFields={defaultFields} contacts={contacts}
        defaultList={(!DATE_QUICK_VIEWS.includes(selectedList)&&selectedList!=='all'&&selectedList!=='seguiment')?selectedList:(lists.find(l=>l.name==='Tasques')?.id||lists[0]?.id)}
        preFill={voicePreFill}
        onSave={addTask} onClose={()=>{setShowModal(false);setVoicePreFill(null);}}/>}
      {showListModal&&<NewListModal onSave={addList} onClose={()=>setShowListModal(false)} groups={presentGroups}/>}
      {editingList&&<ListSettingsModal list={editingList} currentUserUid={user.uid} onSave={(id,data)=>updateList(id,data)} onClose={()=>setEditingList(null)} groups={presentGroups} onShare={shareList} onUnshare={unshareList} onDelete={async id=>{await deleteList(id);setEditingList(null);}}/>}
      {showDefaultFields&&<DefaultFieldsModal fields={defaultFields} onSave={saveDefaultFields} onClose={()=>setShowDefaultFields(false)}/>}
      {showGcalSettings&&<GcalSettingsModal calendars={gcalCalendars} onSave={cals=>{saveGcalCalendars(cals);setShowGcalSettings(false);}} onClose={()=>setShowGcalSettings(false)}/>}
      {deleteConfirm&&<DeleteSeriesModal task={deleteConfirm} onConfirm={mode=>deleteSeries(deleteConfirm,mode)} onClose={()=>setDeleteConfirm(null)}/>}
      {singleDeleteConfirm&&<ConfirmDeleteModal task={singleDeleteConfirm}
        onConfirm={()=>{deleteTask(singleDeleteConfirm.id);setSingleDeleteConfirm(null);}}
        onClose={()=>setSingleDeleteConfirm(null)}/>}
      {toast&&(()=>{const warn=/^⚠/.test(toast);const txt=toast.replace(/^[✓⚠]\s*/,'');return <div className="toast"><span style={{color:warn?'var(--warn)':'var(--success)',fontSize:15}}>{warn?'⚠':'✓'}</span>{txt}</div>;})()}
    </>
  );
}
