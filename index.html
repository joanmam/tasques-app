// ─── TASK ITEM ────────────────────────────────────────────────────────────────
function TaskItem({task,lists,selected,onClick,onToggle,onDelete,onDelay,onTrack,readOnly,assignedOnly,nextOcc}) {
  const [hover,setHover] = useState(false);
  const done  = task.status==='completada';
  const list  = lists.find(l=>l.id===task.listId);
  const total = task.subtasks?.length??0;
  const doneN = task.subtasks?.filter(s=>s.done).length??0;
  const recLabel = RECURRENCE_OPTIONS.find(r=>r.value===task.recurrence&&task.recurrence!=='none')?.label;
  return (
    <div className={`task-item ${done?'done':''} ${selected?'selected':''}`} onClick={onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={list?{background:hexToRgba(list.color,.10)}:undefined}>
      <div className={`task-check ${done?'checked':''}`} style={readOnly?{cursor:'default'}:undefined}
        onClick={e=>{if(readOnly)return;e.stopPropagation();onToggle();}}>{Ic.check}</div>
      <div className="task-body">
        <div className="task-title">{task.title}</div>
        <div className="task-meta">
          <span className={`priority-dot p-${task.priority}`}/>
          <span className={`status-badge s-${task.status}`}>{task.status==='en-curs'?'En curs':task.status==='completada'?'Completada':'Pendent'}</span>
          {task.endDate&&(()=>{
            const cat = dateCategory(task);
            const cfg = DATE_GROUPS.find(g=>g.key===cat);
            // Una ocurrència de sèrie repetida no compta com a rang: la seva startDate és la de la sèrie sencera.
            const isRange = !task.seriesId && task.startDate && task.endDate && task.startDate!==task.endDate;
            return (
              <span className={`date-badge ${cfg?.cls||'date-later'}`}>
                {Ic.calendar}
                {isOverdue(task)?'⚠ ':''}
                {isRange ? <>{fmtList(task.startDate)} → {fmtList(task.endDate)}</> : fmtList(task.endDate)}
                {(task.startTime||task.endTime)&&(
                  <>
                    {' '}{Ic.clock}{task.startTime||'/'}
                    {' '}{Ic.clock}{task.endTime||'/'}
                  </>
                )}
              </span>
            );
          })()}
          {recLabel&&<span className="recurrence-chip" title={nextOcc?`Propera ocurrència: ${fmtList(nextOcc.date)}${nextOcc.time?' '+nextOcc.time:''}`:undefined}>
            🔁 {recLabel}{nextOcc&&` · ${fmtList(nextOcc.date)}${nextOcc.time?' '+nextOcc.time:''}`}
          </span>}
          {task.reminderMinutes>0&&<span className="task-meta-item" title="Recordatori actiu">{Ic.bell}</span>}
          {task.url&&<a className="task-meta-item" href={task.url} target="_blank" rel="noopener noreferrer"
            onClick={e=>e.stopPropagation()} title={task.url} style={{textDecoration:'none',color:'var(--accent)'}}>{Ic.link} Enllaç</a>}
          {task.contactPhone&&<a className="task-meta-item" href={`tel:${task.contactPhone.replace(/\s+/g,'')}`}
            onClick={e=>e.stopPropagation()} title={task.contactName?`${task.contactName}: ${task.contactPhone}`:task.contactPhone}
            style={{textDecoration:'none',color:'var(--accent)'}}>{Ic.phone} {task.contactName||task.contactPhone}</a>}
          {list&&<span className="task-meta-item" style={{color:list.color}}>{Ic.folder} {list.name}</span>}
          {assignedOnly&&<span className="task-meta-item" title="Tasca assignada a mi" style={{color:'var(--accent)'}}>{Ic.person} Assignada a mi</span>}
          {!assignedOnly&&task.assigneeEmail&&<span className="task-meta-item" title="Assignada a algu">{Ic.person} {task.assigneeEmail}</span>}
          {(task.tags||[]).map(tag=>{const c=tagColor(tag);return <span key={tag} className="tag" style={{background:c.bg,color:c.text}}>{tag}</span>;})}
          {total>0&&<span className="task-meta-item">{doneN}/{total}</span>}
        </div>
        {total>0&&<div className="progress-bar"><div className="progress-fill" style={{width:`${(doneN/total)*100}%`}}/></div>}
      </div>
      {readOnly ? (
        <span title="Només lectura" style={{color:'var(--text3)',flexShrink:0,display:'flex',alignItems:'center',width:14,height:14}}>{Ic.eye}</span>
      ) : assignedOnly ? (
        <span title="Assignada — nomes pots completar-la" style={{color:'var(--text3)',flexShrink:0,display:'flex',alignItems:'center',width:14,height:14}}>{Ic.person}</span>
      ) : (
      <div className="task-actions">
        <button className={`track-btn ${task.tracked?'on':''}`} title={task.tracked?'Deixar de seguir':'Seguir tasca'}
          onClick={e=>{e.stopPropagation();onTrack(task);}}>
          {task.tracked?Ic.bmark:Ic.bookmark}
        </button>
        {!done&&(
          <button className="delay-btn" title="Endarrerir 1 hora" onClick={e=>{e.stopPropagation();onDelay(task,'1h');}}>+1h</button>
        )}
        {!done&&(
          <button className="delay-btn" title="Endarrerir 1 dia" onClick={e=>{e.stopPropagation();onDelay(task,'1d');}}>+1d</button>
        )}
        {onDelete&&<button className="btn btn-danger-soft btn-icon" style={{flexShrink:0}} onClick={e=>{e.stopPropagation();onDelete();}}>{Ic.trash}</button>}
      </div>
      )}
    </div>
  );
}

// ─── SUBTASQUES PENDENTS (vista transversal) ───────────────────────────────
// Aplana totes les subtasques no fetes de totes les tasques, amb el nom de la tasca pare,
// independentment de a quina tasca pertanyen. Ordenades per data de venciment.
function SubtasksView({tasks,lists,selectedTask,onSelectTask,onUpdateTask}) {
  const [filterTaskId,setFilterTaskId] = useState('all');
  const [dateFilter,setDateFilter] = useState('all'); // all | today | tomorrow | next7
  const listName = id => lists.find(l=>l.id===id)?.name || 'Sense llista';

  const allRows = tasks
    .flatMap(t => (t.subtasks||[])
      .filter(s => (s.title||'').trim())
      .map(s => ({...s, task:t})));

  // Nomes les tasques amb alguna subtasca, per no omplir el desplegable de soroll.
  const taskOptions = [...new Map(allRows.map(r=>[r.task.id,r.task])).values()]
    .sort((a,b)=>(a.title||'').localeCompare(b.title||''));

  const byTask = filterTaskId==='all' ? allRows : allRows.filter(r=>r.task.id===filterTaskId);
  const pendentsAll = byTask.filter(r=>!r.done);
  const completades = byTask.filter(r=>r.done).sort((a,b)=>(a.due||'').localeCompare(b.due||''));

  // Les vençudes es veuen sempre, independentment del filtre de data triat.
  const overdue = pendentsAll.filter(r=>dateCategoryForDay(r.due)==='overdue');
  const nonOverdue = pendentsAll.filter(r=>dateCategoryForDay(r.due)!=='overdue');
  const dateFiltered = dateFilter==='all' ? nonOverdue
    : dateFilter==='today' ? nonOverdue.filter(r=>r.due===today)
    : dateFilter==='tomorrow' ? nonOverdue.filter(r=>r.due===tomorrowStr)
    : nonOverdue.filter(r=>r.due && r.due<=weekLaterStr); // next7: inclou avui i dema
  const pendents = [...overdue,...dateFiltered].sort((a,b)=>(a.due||'9999-99-99').localeCompare(b.due||'9999-99-99'));

  const toggle = (task,subId) => {
    onUpdateTask({...task, subtasks:(task.subtasks||[]).map(s=>s.id===subId?{...s,done:!s.done}:s)});
  };
  const renderRow = s => (
    <div key={s.task.id+'-'+s.id} className={`task-item ${s.done?'done':''} ${selectedTask?.id===s.task.id?'selected':''}`}
      onClick={()=>onSelectTask(s.task)}>
      <div className={`subtask-check ${s.done?'checked':''}`} onClick={e=>{e.stopPropagation();toggle(s.task,s.id);}}/>
      <div className="task-body">
        <div className="task-title">{s.title}</div>
        <div className="task-meta">
          <span style={{fontSize:11,color:'var(--text3)'}}>{s.task.title} · {listName(s.task.listId)}</span>
          {s.due && (()=>{
            const cat = dateCategoryForDay(s.due);
            const cfg = DATE_GROUPS.find(g=>g.key===cat);
            return <span className={`date-badge ${cfg?.cls||'date-later'}`}>{Ic.calendar}{fmtList(s.due)}</span>;
          })()}
        </div>
      </div>
    </div>
  );

  return (
    <div className="content">
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12,alignItems:'center'}}>
        {taskOptions.length>0 && (
          <select className="detail-select" style={{maxWidth:280}} value={filterTaskId}
            onChange={e=>setFilterTaskId(e.target.value)}>
            <option value="all">Totes les tasques</option>
            {taskOptions.map(t=><option key={t.id} value={t.id}>{t.title}</option>)}
          </select>
        )}
        <span className="filter-sep">|</span>
        {[['all','Totes'],['today','Avui'],['tomorrow','Demà'],['next7','Pròxims 7 dies']].map(([v,l])=>(
          <button key={v} className={`filter-chip ${dateFilter===v?'active':''}`} onClick={()=>setDateFilter(v)}>{l}</button>
        ))}
      </div>

      {byTask.length===0 ? (
        <div className="empty-state">{Ic.check}<p>Cap subtasca.</p></div>
      ) : pendents.length===0 && completades.length===0 ? (
        <div className="empty-state">{Ic.check}<p>Cap subtasca amb aquest filtre.</p></div>
      ) : (<>
        {pendents.map(renderRow)}
        {completades.length>0 && (<>
          <div className="date-group-header">
            <span className="dgh-dot" style={{background:'var(--success)'}}/>
            Completades
            <span className="dgh-count">{completades.length}</span>
          </div>
          {completades.map(renderRow)}
        </>)}
      </>)}
    </div>
  );
}

// ─── DETAIL PANEL ─────────────────────────────────────────────────────────────
function DetailPanel({task,lists,defaultFields,allTags,currentUserUid,currentUserEmail,onUpdate,onDelete,onClose,onDelay,onInviteWatcher,onRemoveWatcher,onAssign,onUnassign,allUsers,contacts}) {
  const [local,setLocal] = useState(task);
  const [tagInput,setTagInput] = useState('');
  const timer = useRef(null);
  useEffect(()=>setLocal(task),[task.id]);
  const push = patch => {
    const updated = {...local,...patch};
    setLocal(updated);
    clearTimeout(timer.current);
    timer.current = setTimeout(()=>onUpdate(updated),500);
  };
  const addTag = t => {t=t.trim().toLowerCase();if(t&&!(local.tags||[]).includes(t))push({tags:[...(local.tags||[]),t]});setTagInput('');};
  const removeTag = t => push({tags:(local.tags||[]).filter(x=>x!==t)});
  const addSubtask = () => push({subtasks:[...(local.subtasks||[]),{id:uid(),title:'',done:false}]});
  const updSubtask = (id,p) => push({subtasks:(local.subtasks||[]).map(s=>s.id===id?{...s,...p}:s)});
  const delSubtask = id => push({subtasks:(local.subtasks||[]).filter(s=>s.id!==id)});
  const list = lists.find(l=>l.id===local.listId);
  const customFields = list?.fields||[];
  const customValues = local.customValues||{};
  const setCustomValue = (fid,val) => push({customValues:{...customValues,[fid]:val}});
  // ─── Plantilla AuditGDP ───
  const hasAuditGdpTag = (local.tags||[]).map(t=>String(t).toLowerCase()).includes(AUDITGDP_TAG);
  const auditDateField = findAuditDateField(list);
  const auditDateValue = auditDateField ? customValues[auditDateField.id] : null;
  const [templateMsg,setTemplateMsg] = useState('');
  const applyAuditTemplate = () => {
    if (!auditDateField) { setTemplateMsg('La llista no te el camp "Data Auditoria".'); return; }
    if (!auditDateValue) { setTemplateMsg('Omple primer la "Data Auditoria".'); return; }
    const sowDate = local.startDate || today;
    const fresh = buildAuditGdpSubtasks(auditDateValue, sowDate);
    const existingTitles = new Set((local.subtasks||[]).map(s=>s.title.trim().toLowerCase()));
    const toAdd = fresh.filter(s=>!existingTitles.has(s.title.trim().toLowerCase()));
    if (!toAdd.length) { setTemplateMsg('Ja hi son totes.'); return; }
    commit({
      subtasks:[...(local.subtasks||[]),...toAdd],
      startDate: local.startDate || sowDate,
      endDate:   local.endDate   || addMonths(auditDateValue,1),
    });
    setTemplateMsg(`Afegides ${toAdd.length} subtasques.`);
  };
  // Adjuncions (Firebase Storage)
  const fileRef = useRef(null);
  const [uploading,setUploading] = useState(false);
  const [uploadErr,setUploadErr] = useState('');
  const commit = patch => { const u={...local,...patch}; setLocal(u); clearTimeout(timer.current); onUpdate(u); };
  const ALLOWED = ['application/pdf','image/jpeg','image/jpg','image/png','image/webp','image/heic'];
  const MAX_BYTES = 25*1024*1024; // 25 MB per fitxer
  const fmtSize = b => b<1024?b+' B':b<1048576?(b/1024).toFixed(0)+' KB':(b/1048576).toFixed(1)+' MB';
  const uploadFiles = async fileList => {
    const files = Array.from(fileList||[]); if(!files.length) return;
    setUploadErr(''); setUploading(true);
    try {
      const u = auth.currentUser;
      const added = [];
      for (const f of files) {
        if (ALLOWED.length && !ALLOWED.includes(f.type) && !/\.(pdf|jpe?g|png|webp|heic)$/i.test(f.name)) {
          setUploadErr(`"${f.name}" no es un PDF ni una imatge.`); continue;
        }
        if (f.size>MAX_BYTES) { setUploadErr(`"${f.name}" supera els 25 MB.`); continue; }
        const aid = uid();
        const safe = f.name.replace(/[^\w.\-]+/g,'_');
        const path = `attachments/${u.uid}/${local.id}/${aid}_${safe}`;
        const ref = storage.ref(path);
        await ref.put(f);
        const url = await ref.getDownloadURL();
        added.push({id:aid,name:f.name,title:f.name,url,path,type:f.type,size:f.size});
      }
      if (added.length) commit({attachments:[...(local.attachments||[]),...added]});
    } catch(err) {
      setUploadErr('Error en pujar: '+(err.code||err.message||err));
    }
    setUploading(false);
    if (fileRef.current) fileRef.current.value='';
  };
  const removeAttachment = async att => {
    if (att.path) { try { await storage.ref(att.path).delete(); } catch(e){/* ja esborrat o sense permis */} }
    commit({attachments:(local.attachments||[]).filter(a=>a.id!==att.id)});
  };
  const renameAttachment = (att, title) =>
    push({attachments:(local.attachments||[]).map(a=>a.id===att.id?{...a,title}:a)});
  const isImg = att => (att.type||'').startsWith('image/') || /\.(jpe?g|png|webp|heic|gif)$/i.test(att.name||'');
  // ── Missatges de la tasca (només tasques compartides) ──
  const isShared = (list?.sharedWith||[]).length>0;
  const messages = [...(task.comments||[])].sort((a,b)=>(a.ts||0)-(b.ts||0));
  const [msgInput,setMsgInput] = useState('');
  const [sendingMsg,setSendingMsg] = useState(false);
  const fmtMsgTime = ts => { if(!ts) return ''; const d=new Date(ts);
    return d.toLocaleDateString('ca-ES',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('ca-ES',{hour:'2-digit',minute:'2-digit'}); };
  const sendMessage = async () => {
    const text = msgInput.trim(); if(!text||sendingMsg) return;
    setSendingMsg(true);
    const msg = {id:uid(), uid:currentUserUid||'', email:currentUserEmail||'', text, ts:Date.now()};
    try {
      await db.collection('tasks').doc(local.id).update({comments: firebase.firestore.FieldValue.arrayUnion(msg)});
      setMsgInput('');
    } catch(e){ /* sense permis o error de xarxa */ }
    setSendingMsg(false);
  };
  return (
    <div className="detail-panel">
      <div className="detail-header">
        <h3>Detall</h3>
        <div style={{display:'flex',gap:6}}>
          {onDelete&&<button className="btn btn-danger-soft btn-icon" onClick={onDelete}>{Ic.trash}</button>}
          <button className="btn btn-ghost btn-icon" onClick={onClose}>{Ic.x}</button>
        </div>
      </div>
      <div className="detail-body">
        <div className="detail-field">
          <input className="detail-title-input" value={local.title||''} placeholder="Títol"
            onChange={e=>push({title:e.target.value})}/>
        </div>
        <div className="detail-field">
          <label>Descripció</label>
          <textarea className="detail-desc" value={local.description||''} placeholder="Descripció..."
            onChange={e=>push({description:e.target.value})}/>
        </div>
        <div className="detail-field">
          <label>URL</label>
          <input type="url" className="detail-date" value={local.url||''} placeholder="https://..."
            onChange={e=>push({url:e.target.value})}/>
        </div>
        <div className="detail-field">
          <label>Contacte</label>
          <ContactPicker contacts={contacts} value={local.contactId||''} className="detail-select" onChange={id=>{
            const c = (contacts||[]).find(x=>x.id===id);
            push({contactId:c?.id||'',contactName:c?.name||'',contactPhone:c?(c.phone1||c.phone2||''):''});
          }}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div className="detail-field">
            <label>Estat</label>
            <select className="detail-select" value={local.status} onChange={e=>push({status:e.target.value})}>
              <option value="pendent">Pendent</option>
              <option value="en-curs">En curs</option>
              <option value="completada">Completada</option>
            </select>
          </div>
          <div className="detail-field">
            <label>Prioritat</label>
            <select className="detail-select" value={local.priority} onChange={e=>push({priority:e.target.value})}>
              <option value="alta">Alta</option>
              <option value="mitjana">Mitjana</option>
              <option value="baixa">Baixa</option>
            </select>
          </div>
        </div>
        {/* Dates + times */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div className="detail-field">
            <label>Inici</label>
            <input type="date" className="detail-date" value={local.startDate||''} onChange={e=>push({startDate:e.target.value})}/>
          </div>
          <div className="detail-field">
            <label>{(local.recurrence&&local.recurrence!=='none')?'Pròxim venciment':'Fi'}</label>
            <input type="date" className="detail-date" value={local.endDate||''} onChange={e=>push({endDate:e.target.value})}/>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div className="detail-field">
            <label>Hora inici</label>
            <input type="time" className="detail-date" value={local.startTime||''} onChange={e=>push({startTime:e.target.value})}/>
          </div>
          <div className="detail-field">
            <label>Hora fi</label>
            <input type="time" className="detail-date" value={local.endTime||''} onChange={e=>push({endTime:e.target.value})}/>
          </div>
        </div>
        {(defaultFields||[]).length>0&&(
          <div className="custom-fields-section">
            <div className="custom-fields-title"><span>Camps per defecte</span></div>
            {(defaultFields||[]).map(f=>(
              <div key={f.id} className="detail-field" style={{marginBottom:10}}>
                <label>{f.name}</label>
                <CustomFieldInput field={f} value={customValues[f.id]} onChange={v=>setCustomValue(f.id,v)}/>
              </div>
            ))}
          </div>
        )}
        {customFields.length>0&&(
          <div className="custom-fields-section">
            <div className="custom-fields-title"><span>Camps de la llista</span></div>
            {customFields.map(f=>(
              <div key={f.id} className="detail-field" style={{marginBottom:10}}>
                <label>{f.name}</label>
                <CustomFieldInput field={f} value={customValues[f.id]} onChange={v=>setCustomValue(f.id,v)}/>
              </div>
            ))}
          </div>
        )}
        {/* Delay buttons */}
        {local.status!=='completada'&&(
          <div className="detail-field">
            <label>Endarrerir</label>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" style={{fontSize:12,padding:'5px 14px',fontWeight:700}}
                onClick={()=>onDelay(local,'1h')}>+1 hora</button>
              <button className="btn btn-ghost" style={{fontSize:12,padding:'5px 14px',fontWeight:700}}
                onClick={()=>onDelay(local,'1d')}>+1 dia</button>
            </div>
          </div>
        )}
        {/* Reminder + Recurrence */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div className="detail-field">
            <label>{Ic.bell} Recordatori</label>
            <select className="detail-select" value={local.reminderMinutes||0} onChange={e=>push({reminderMinutes:+e.target.value})}>
              {REMINDER_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>
          <div className="detail-field">
            <label>{Ic.repeat} Repetició</label>
            <select className="detail-select" value={local.recurrence||'none'} onChange={e=>push({recurrence:e.target.value})}>
              {RECURRENCE_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>
        </div>
        {(local.recurrence&&local.recurrence!=='none')&&(
          <div className="detail-field">
            <label>Fi de la repetició</label>
            <input type="date" className="detail-date" value={local.recurrenceEndDate||''}
              onChange={e=>push({recurrenceEndDate:e.target.value})}
              min={local.endDate||today}/>
            {local.recurrenceEndDate&&(
              <button style={{fontSize:11,color:'var(--text3)',background:'none',border:'none',cursor:'pointer',padding:'2px 0',fontFamily:'inherit'}}
                onClick={()=>push({recurrenceEndDate:''})}>× Eliminar data de fi</button>
            )}
          </div>
        )}
        {(local.recurrence&&local.recurrence!=='none'&&local.status!=='completada')&&(
          <div style={{padding:'8px 10px',background:'rgba(247,183,79,.08)',border:'1px solid rgba(247,183,79,.25)',borderRadius:8,fontSize:12,color:'var(--text2)'}}>
            <div style={{marginBottom:6,fontSize:11,color:'var(--text3)'}}>
              ℹ️ El checkbox completa l'ocurrència actual i programa la propera.
            </div>
            <button className="btn btn-ghost" style={{fontSize:12,padding:'4px 12px',width:'100%',justifyContent:'center'}}
              onClick={()=>push({status:'completada',recurrence:'none'})}>
              🏁 Finalitzar sèrie (marcar com a feta definitivament)
            </button>
          </div>
        )}
        <div className="detail-field">
          <label>Llista</label>
          <select className="detail-select" value={local.listId||''} onChange={e=>push({listId:e.target.value})}>
            <option value="">— Sense llista —</option>
            {lists.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
        </div>
        <div className="detail-field">
          <label>Etiquetes</label>
          <div className="tag-input-wrap">
            {(local.tags||[]).map(tag=>{const c=tagColor(tag);return(
              <span key={tag} className="tag-pill" style={{background:c.bg,color:c.text}}>
                {tag}<button onClick={()=>removeTag(tag)}>×</button>
              </span>);})}
            <input className="tag-input" placeholder="etiqueta + Enter" value={tagInput}
              onChange={e=>setTagInput(e.target.value)}
              onKeyDown={e=>{
                if(e.key==='Enter'||e.key===','){e.preventDefault();addTag(tagInput);}
                if(e.key==='Backspace'&&!tagInput&&(local.tags||[]).length)removeTag((local.tags||[]).at(-1));
              }}/>
          </div>
          {(()=>{const existing=(allTags||[]).filter(t=>!(local.tags||[]).includes(t)); return existing.length>0&&(
            <select className="detail-select" style={{marginTop:6}} value=""
              onChange={e=>{if(e.target.value)addTag(e.target.value);}}>
              <option value="">+ Etiqueta ja feta servir…</option>
              {existing.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          );})()}
        </div>
        <div className="detail-field">
          <label>Adjuncions ({(local.attachments||[]).length})</label>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {(local.attachments||[]).map(att=>(
              <div key={att.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',background:'var(--bg2)',borderRadius:8,fontSize:12}}>
                <a href={att.url} target="_blank" rel="noopener noreferrer" title="Obrir document" style={{flexShrink:0,display:'flex'}}>
                  {isImg(att)
                    ? <img src={att.url} alt="" style={{width:34,height:34,objectFit:'cover',borderRadius:6}}/>
                    : <span style={{width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--card)',borderRadius:6,fontSize:11,fontWeight:700,color:'var(--text2)'}}>PDF</span>}
                </a>
                <div style={{flex:1,minWidth:0,display:'flex',flexDirection:'column',gap:2}}>
                  <input className="att-title-input" value={att.title??att.name??''} placeholder={att.name||'Títol del document'}
                    onChange={e=>renameAttachment(att,e.target.value)} title="Edita el títol del document"/>
                  <div style={{display:'flex',gap:5,alignItems:'center',color:'var(--text3)',fontSize:10,overflow:'hidden'}}>
                    <a href={att.url} target="_blank" rel="noopener noreferrer" title={att.name}
                      style={{color:'var(--text3)',textDecoration:'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{att.name}</a>
                    {att.size>0&&<span style={{flexShrink:0}}>· {fmtSize(att.size)}</span>}
                  </div>
                </div>
                <span onClick={()=>removeAttachment(att)} title="Eliminar adjuncio"
                  style={{color:'var(--text3)',cursor:'pointer',flexShrink:0,fontSize:15,lineHeight:1,padding:'0 2px'}}>×</span>
              </div>
            ))}
            <input ref={fileRef} type="file" accept=".pdf,image/jpeg,image/png,image/webp,application/pdf" multiple
              style={{display:'none'}} onChange={e=>uploadFiles(e.target.files)}/>
            <button className="add-subtask-btn" disabled={uploading} onClick={()=>fileRef.current&&fileRef.current.click()}>
              {uploading?'Pujant…':<>{Ic.plus} Adjuntar PDF o imatge</>}
            </button>
            {uploadErr&&<div style={{fontSize:11,color:'var(--danger)'}}>{uploadErr}</div>}
          </div>
        </div>
        <div className="detail-field">
          <label>Subtasques ({(local.subtasks||[]).filter(s=>s.done).length}/{(local.subtasks||[]).length})</label>
          <div className="subtask-editor">
            {(local.subtasks||[]).map(s=>(
              <div key={s.id} className="subtask-row">
                <div className={`subtask-check ${s.done?'checked':''}`} onClick={()=>updSubtask(s.id,{done:!s.done})}/>
                <input value={s.title} placeholder="Subtasca..." onChange={e=>updSubtask(s.id,{title:e.target.value})}
                  style={s.done?{textDecoration:'line-through',opacity:.5}:{}}/>
                <input type="date" className="detail-date" style={{width:126,flexShrink:0}} value={s.due||''}
                  onChange={e=>updSubtask(s.id,{due:e.target.value})} title="Data de venciment"/>
                <span className="del" onClick={()=>delSubtask(s.id)}>×</span>
              </div>
            ))}
            <button className="add-subtask-btn" onClick={addSubtask}>{Ic.plus} Afegir subtasca</button>
            {hasAuditGdpTag && (
              <div style={{marginTop:6,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <button className="btn btn-ghost" style={{fontSize:12,padding:'6px 12px'}} onClick={applyAuditTemplate}>
                  Aplica plantilla AuditGDP
                </button>
                {templateMsg && <span style={{fontSize:11,color:'var(--text3)'}}>{templateMsg}</span>}
              </div>
            )}
          </div>
        </div>
        {isShared && (
        <div className="detail-field">
          <label>Missatges ({messages.length})</label>
          <div className="task-chat">
            {messages.length===0
              ? <div className="task-chat-empty">Cap missatge encara. Escriu per parlar sobre aquesta tasca.</div>
              : messages.map(m=>{
                  const mine = m.uid===currentUserUid;
                  return (
                    <div key={m.id} className={`chat-msg ${mine?'mine':''}`}>
                      <div className="chat-bubble">
                        {!mine && <div className="chat-author">{m.email||'?'}</div>}
                        <div className="chat-text">{m.text}</div>
                        <div className="chat-time">{fmtMsgTime(m.ts)}</div>
                      </div>
                    </div>
                  );
                })}
          </div>
          <div className="chat-input-row">
            <input className="chat-input" value={msgInput} placeholder="Escriu un missatge…"
              onChange={e=>setMsgInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}}/>
            <button className="chat-send" disabled={sendingMsg||!msgInput.trim()} onClick={sendMessage} title="Envia">➤</button>
          </div>
        </div>
        )}
        {local.ownerId===currentUserUid && (
          <AssignSection taskId={local.id} assigneeId={local.assigneeId||''} assigneeEmail={local.assigneeEmail||''}
            onAssign={onAssign} onUnassign={onUnassign} allUsers={allUsers} currentUserUid={currentUserUid}/>
        )}
        {local.ownerId===currentUserUid && (
          <WatcherSection taskId={local.id} watchers={local.watchers||[]} watcherEmails={local.watcherEmails||{}}
            onInvite={onInviteWatcher} onRemove={onRemoveWatcher}
            allUsers={allUsers} currentUserUid={currentUserUid}/>
        )}
      </div>
    </div>
  );
}

// ─── ASSIGN SECTION (Assignar tasca) ───────────────────────────────────────────
function AssignSection({taskId,assigneeId,assigneeEmail,onAssign,onUnassign,allUsers,currentUserUid}) {
  const [email,setEmail]     = useState('');
  const [error,setError]     = useState('');
  const [loading,setLoading] = useState(false);
  const candidates = (allUsers||[]).filter(u=>u.uid!==currentUserUid);
  const handleAssign = async () => {
    if (!email.trim()) return;
    setLoading(true); setError('');
    const err = await onAssign(taskId, email.trim());
    if (err) setError(err); else setEmail('');
    setLoading(false);
  };
  return (
    <div className="detail-field" style={{borderTop:'1px solid var(--border)',paddingTop:12}}>
      <label>{Ic.person} Assigna a</label>
      <p style={{fontSize:11,color:'var(--text3)',marginTop:-2,marginBottom:8}}>
        L'assignat pot veure la tasca i marcar-la com a completada, pero nomes tu la pots editar.
      </p>
      {assigneeId ? (
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div className="sidebar-avatar" style={{width:24,height:24,fontSize:10,flexShrink:0}}>
            {(assigneeEmail?.[0]||'?').toUpperCase()}
          </div>
          <span style={{flex:1,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{assigneeEmail||assigneeId}</span>
          <button className="btn btn-ghost btn-icon" style={{color:'var(--danger)',padding:4}}
            title="Desassignar" onClick={()=>onUnassign(taskId)}>{Ic.x}</button>
        </div>
      ) : candidates.length===0 ? (
        <p style={{fontSize:12,color:'var(--text3)',padding:'6px 0'}}>
          No hi ha cap altre usuari registrat a l'app per assignar.
        </p>
      ) : (
        <div style={{display:'flex',gap:8}}>
          <select className="input" value={email}
            onChange={e=>{setEmail(e.target.value);setError('');}} style={{flex:1}}>
            <option value="">— Selecciona una persona —</option>
            {candidates.map(u=><option key={u.uid} value={u.email}>{u.email}</option>)}
          </select>
          <button className="btn btn-primary" style={{whiteSpace:'nowrap',padding:'7px 14px'}}
            onClick={handleAssign} disabled={loading||!email.trim()}>
            {loading?'...':'Assigna'}
          </button>
        </div>
      )}
      {error&&<p style={{color:'var(--danger)',fontSize:11,marginTop:4}}>{error}</p>}
    </div>
  );
}

// ─── WATCHER SECTION (Convida a informar) ──────────────────────────────────────
function WatcherSection({taskId,watchers,watcherEmails,onInvite,onRemove,allUsers,currentUserUid}) {
  const [email,setEmail]     = useState('');
  const [error,setError]     = useState('');
  const [loading,setLoading] = useState(false);
  const candidates = (allUsers||[]).filter(u=>u.uid!==currentUserUid && !watchers.includes(u.uid));
  const handleInvite = async () => {
    if (!email.trim()) return;
    setLoading(true); setError('');
    const err = await onInvite(taskId, email.trim());
    if (err) setError(err); else { setEmail(''); }
    setLoading(false);
  };
  return (
    <div className="detail-field" style={{borderTop:'1px solid var(--border)',paddingTop:12}}>
      <label>{Ic.eye} Convida a informar</label>
      <p style={{fontSize:11,color:'var(--text3)',marginTop:-2,marginBottom:8}}>
        Convida algú a veure aquesta tasca en mode només lectura, sense poder-la editar ni completar.
      </p>
      {candidates.length===0 ? (
        <p style={{fontSize:12,color:'var(--text3)',padding:'6px 0'}}>
          No hi ha cap altre usuari registrat a l'app per convidar.
        </p>
      ) : (
        <div style={{display:'flex',gap:8}}>
          <select className="input" value={email}
            onChange={e=>{setEmail(e.target.value);setError('');}} style={{flex:1}}>
            <option value="">— Selecciona una persona —</option>
            {candidates.map(u=><option key={u.uid} value={u.email}>{u.email}</option>)}
          </select>
          <button className="btn btn-primary" style={{whiteSpace:'nowrap',padding:'7px 14px'}}
            onClick={handleInvite} disabled={loading||!email.trim()}>
            {loading?'...':'Convida'}
          </button>
        </div>
      )}
      {error&&<p style={{color:'var(--danger)',fontSize:11,marginTop:4}}>{error}</p>}
      {watchers.length>0 && (
        <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>
          {watchers.map(uid=>(
            <div key={uid} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0'}}>
              <div className="sidebar-avatar" style={{width:24,height:24,fontSize:10,flexShrink:0}}>
                {(watcherEmails[uid]?.[0]||'?').toUpperCase()}
              </div>
              <span style={{flex:1,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{watcherEmails[uid]||uid}</span>
              <button className="btn btn-ghost btn-icon" style={{color:'var(--danger)',padding:4}}
                title="Treure accés" onClick={()=>onRemove(taskId,uid)}>{Ic.x}</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── CUSTOM FIELD INPUT ────────────────────────────────────────────────────────
function CustomFieldInput({field,value,onChange}) {
  switch(field.type) {
    case 'text':    return <input className="detail-input" value={value||''} onChange={e=>onChange(e.target.value)} placeholder={field.name}/>;
    case 'number':  return <input type="number" className="detail-input" value={value??''} onChange={e=>onChange(e.target.value)} placeholder="0"/>;
    case 'date':    return <input type="date" className="detail-date" value={value||''} onChange={e=>onChange(e.target.value)}/>;
    case 'url':     return <input type="url" className="detail-input" value={value||''} onChange={e=>onChange(e.target.value)} placeholder="https://..."/>;
    case 'checkbox':return (
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <input type="checkbox" className="detail-checkbox" checked={!!value} onChange={e=>onChange(e.target.checked)}/>
        <span style={{fontSize:13,color:'var(--text2)'}}>{value?'Sí':'No'}</span>
      </div>
    );
    case 'select':  return (
      <select className="detail-select" value={value||''} onChange={e=>onChange(e.target.value)}>
        <option value="">— Selecciona —</option>
        {(field.options||[]).map(o=><option key={o} value={o}>{o}</option>)}
      </select>
    );
    default: return null;
  }
}

// ─── FIELDS MANAGER ────────────────────────────────────────────────────────────
function FieldsManager({fields,onChange}) {
  const [showAdd,setShowAdd] = useState(false);
  const [newField,setNewField] = useState({name:'',type:'text',options:[]});
  const [newOption,setNewOption] = useState('');
  const [editingId,setEditingId] = useState(null);
  const [editOption,setEditOption] = useState('');
  const addField = () => {
    if (!newField.name.trim()) return;
    onChange([...fields,{...newField,id:uid(),name:newField.name.trim()}]);
    setNewField({name:'',type:'text',options:[]}); setNewOption(''); setShowAdd(false);
  };
  const removeField = id => onChange(fields.filter(f=>f.id!==id));
  const addOption = () => {
    if (!newOption.trim()) return;
    setNewField(f=>({...f,options:[...f.options,newOption.trim()]})); setNewOption('');
  };
  const addExistingOption = id => {
    if (!editOption.trim()) return;
    onChange(fields.map(f=>f.id===id?{...f,options:[...(f.options||[]),editOption.trim()]}:f));
    setEditOption('');
  };
  const removeExistingOption = (id,opt) => {
    onChange(fields.map(f=>f.id===id?{...f,options:(f.options||[]).filter(o=>o!==opt)}:f));
  };
  const typeLabel = t => FIELD_TYPES.find(x=>x.value===t)?.label||t;
  return (
    <div>
      {fields.length===0&&!showAdd&&<p style={{fontSize:12,color:'var(--text3)',marginBottom:10}}>Cap camp personalitzat.</p>}
      {fields.map(f=>(
        <div key={f.id}>
          <div className="field-row">
            <span style={{width:12,height:12,color:'var(--text3)',flexShrink:0}}>{Ic.drag}</span>
            <span className="field-row-name">{f.name}</span>
            <span className="field-type-badge">{typeLabel(f.type)}</span>
            {f.type==='select'&&(
              <span style={{fontSize:10,color:'var(--text3)',cursor:'pointer',textDecoration:'underline'}}
                onClick={()=>{setEditingId(editingId===f.id?null:f.id);setEditOption('');}}>
                {(f.options||[]).length} opc
              </span>
            )}
            <div className="field-actions">
              <button className="field-action-btn danger" onClick={()=>removeField(f.id)}>{Ic.trash}</button>
            </div>
          </div>
          {editingId===f.id&&f.type==='select'&&(
            <div className="add-field-form" style={{marginTop:4,marginBottom:8}}>
              <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Opcions:</div>
              {(f.options||[]).map(o=>(
                <div key={o} className="option-row" style={{marginBottom:4}}>
                  <span style={{flex:1,fontSize:13}}>{o}</span>
                  <button className="option-del" onClick={()=>removeExistingOption(f.id,o)}>×</button>
                </div>
              ))}
              <div className="option-row">
                <input className="input" placeholder="Nova opció..." value={editOption}
                  onChange={e=>setEditOption(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&addExistingOption(f.id)} style={{flex:1}}/>
                <button className="btn btn-ghost" style={{padding:'6px 10px',fontSize:12}} onClick={()=>addExistingOption(f.id)}>+</button>
              </div>
            </div>
          )}
        </div>
      ))}
      {showAdd ? (
        <div className="add-field-form">
          <div className="input-row">
            <input className="input" placeholder="Nom del camp" value={newField.name}
              onChange={e=>setNewField(f=>({...f,name:e.target.value}))}
              onKeyDown={e=>e.key==='Enter'&&newField.type!=='select'&&addField()} autoFocus/>
            <select className="input" style={{maxWidth:140}} value={newField.type}
              onChange={e=>setNewField(f=>({...f,type:e.target.value,options:[]}))}>
              {FIELD_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
            </select>
          </div>
          {newField.type==='select'&&(
            <div>
              <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Opcions:</div>
              {newField.options.map(o=>(
                <div key={o} className="option-row" style={{marginBottom:4}}>
                  <span style={{flex:1,fontSize:13}}>{o}</span>
                  <button className="option-del" onClick={()=>setNewField(f=>({...f,options:f.options.filter(x=>x!==o)}))}>×</button>
                </div>
              ))}
              <div className="option-row">
                <input className="input" placeholder="Nova opció..." value={newOption}
                  onChange={e=>setNewOption(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&addOption()} style={{flex:1}}/>
                <button className="btn btn-ghost" style={{padding:'6px 10px',fontSize:12}} onClick={addOption}>+</button>
              </div>
            </div>
          )}
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" style={{fontSize:12,padding:'6px 12px'}} onClick={()=>setShowAdd(false)}>Cancel·lar</button>
            <button className="btn btn-primary" style={{fontSize:12,padding:'6px 12px'}} onClick={addField}>Afegir</button>
          </div>
        </div>
      ) : (
        <button className="btn btn-ghost" style={{fontSize:12,padding:'6px 12px',marginTop:4}} onClick={()=>setShowAdd(true)}>
          {Ic.plus} Nou camp
        </button>
      )}
    </div>
  );
}
