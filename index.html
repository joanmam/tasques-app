// ─── CONTACT PICKER (buscador de contactes, sense distinció d'accents/majúscules) ─
function ContactPicker({contacts,value,onChange,placeholder,className}) {
  const [query,setQuery] = useState('');
  const [open,setOpen] = useState(false);
  const wrapRef = useRef(null);

  useEffect(()=>{
    const onDocClick = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  },[]);

  const sorted = (contacts||[]).slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const selected = sorted.find(c=>c.id===value);
  const q = normText(query);
  const filtered = q ? sorted.filter(c=>{
    const hay = normText([c.name,c.org,c.phone1,c.phone2,c.email1,c.category].filter(Boolean).join(' '));
    return hay.includes(q);
  }) : sorted;

  const pick = c => { onChange(c.id); setQuery(''); setOpen(false); };
  const clear = () => { onChange(''); setQuery(''); setOpen(false); };

  return (
    <div className="contact-picker" ref={wrapRef}>
      <input className={className||'input'} placeholder={placeholder||'Cerca un contacte (nom, telèfon, empresa...)'}
        value={open ? query : (selected ? `${selected.name}${selected.phone1||selected.phone2?' · '+(selected.phone1||selected.phone2):''}` : '')}
        onFocus={()=>{setOpen(true);setQuery('');}}
        onChange={e=>{setQuery(e.target.value);setOpen(true);}}
        style={selected?{paddingRight:26}:undefined}/>
      {selected&&!open&&(
        <button type="button" className="contact-picker-clear" title="Treu el contacte" onClick={clear}>✕</button>
      )}
      {open&&(
        <div className="contact-picker-list">
          {value&&<div className="contact-picker-clearall" onClick={clear}>— Cap —</div>}
          {filtered.length===0
            ? <div className="contact-picker-empty">Cap contacte trobat</div>
            : filtered.slice(0,50).map(c=>(
                <div key={c.id} className="contact-picker-item" onClick={()=>pick(c)}>
                  <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</span>
                  {(c.phone1||c.phone2)&&<span className="contact-picker-item-phone">{c.phone1||c.phone2}</span>}
                </div>
              ))}
        </div>
      )}
    </div>
  );
}

// ─── NEW TASK MODAL ───────────────────────────────────────────────────────────
function NewTaskModal({lists,defaultFields,defaultList,contacts,onSave,onClose,preFill}) {
  const [form,setForm] = useState(()=>{
    // Durada per defecte d'una hora. Sense cap pista (creació manual): comença a la propera hora en
    // punt. Si el preFill (p. ex. la veu, que només dona "a les 15:00") només coneix un dels dos
    // extrems, es dedueix l'altre sumant/restant 1h, en lloc d'agafar l'hora actual del rellotge.
    const now = new Date();
    const startHour = now.getMinutes()===0 ? now.getHours() : now.getHours()+1;
    const pad = n => String(((n%24)+24)%24).padStart(2,'0');
    const addHour = (hhmm,delta) => { const [h,m]=hhmm.split(':').map(Number); return `${pad(h+delta)}:${String(m).padStart(2,'0')}`; };
    const defaultStartTime = `${pad(startHour)}:00`;
    const defaultEndTime = addHour(defaultStartTime,1);
    let startTime, endTime;
    if (preFill?.startTime && preFill?.endTime) { startTime=preFill.startTime; endTime=preFill.endTime; }
    else if (preFill?.startTime) { startTime=preFill.startTime; endTime=addHour(preFill.startTime,1); }
    else if (preFill?.endTime) { endTime=preFill.endTime; startTime=addHour(preFill.endTime,-1); }
    else { startTime=defaultStartTime; endTime=defaultEndTime; }
    return {
      title:preFill?.title||'',description:'',url:preFill?.url||'',startDate:preFill?.endDate||today,
      endDate:preFill?.endDate||today,startTime,endTime,
      priority:'mitjana',status:'pendent',tags:[],
      contactId:'',contactName:'',contactPhone:'',
      listId:preFill?.listId||defaultList||lists[0]?.id||'',subtasks:[],customValues:{},
      reminderMinutes:0,recurrence:'none',recurrenceEndDate:''
    };
  });
  const [tagInput,setTagInput] = useState('');
  const ref = useRef(null);
  useEffect(()=>ref.current?.focus(),[]);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const setContact = contactId => {
    const c = (contacts||[]).find(x=>x.id===contactId);
    setForm(f=>({...f,contactId:c?.id||'',contactName:c?.name||'',contactPhone:c?(c.phone1||c.phone2||''):''}));
  };
  const addTag = t => {t=t.trim().toLowerCase();if(t&&!form.tags.includes(t))set('tags',[...form.tags,t]);setTagInput('');};
  const submit = () => {if(!form.title.trim())return;onSave(form);};
  const sortedContacts = (contacts||[]).slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <h2>Nova tasca</h2>
        <input ref={ref} className="input" placeholder="Títol *" value={form.title}
          onChange={e=>set('title',e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
        <textarea className="input" placeholder="Descripció (opcional)" value={form.description}
          onChange={e=>set('description',e.target.value)} style={{resize:'vertical',minHeight:52}}/>
        <input type="url" className="input" placeholder="URL (opcional)" value={form.url}
          onChange={e=>set('url',e.target.value)}/>
        {sortedContacts.length>0&&(
          <ContactPicker contacts={contacts} value={form.contactId} placeholder="Contacte (opcional) — cerca per nom, telèfon..."
            onChange={id=>setContact(id)}/>
        )}
        <div className="input-row">
          <select className="input" value={form.priority} onChange={e=>set('priority',e.target.value)}>
            <option value="alta">Alta</option><option value="mitjana">Mitjana</option><option value="baixa">Baixa</option>
          </select>
          <select className="input" value={form.status} onChange={e=>set('status',e.target.value)}>
            <option value="pendent">Pendent</option><option value="en-curs">En curs</option>
          </select>
          <select className="input" value={form.listId} onChange={e=>set('listId',e.target.value)}>
            <option value="">— Llista —</option>
            {lists.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
        </div>
        {(()=>{
          // Camps per defecte (configurats a "Camps per defecte"): s'apliquen a totes les tasques,
          // independentment de la llista. Es mostren aquí en files de 3.
          const dFields = defaultFields||[];
          if(!dFields.length) return null;
          const rows = [];
          for (let i=0;i<dFields.length;i+=3) rows.push(dFields.slice(i,i+3));
          return rows.map((row,ri)=>(
            <div className="input-row" key={ri}>
              {row.map(f=>(
                <div style={{flex:1}} key={f.id}>
                  <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>{f.name}</label>
                  <CustomFieldInput field={f} value={form.customValues[f.id]} onChange={v=>set('customValues',{...form.customValues,[f.id]:v})}/>
                </div>
              ))}
            </div>
          ));
        })()}
        <div className="input-row">
          <div style={{flex:1}}>
            <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Inici</label>
            <input type="date" className="input" value={form.startDate} onChange={e=>set('startDate',e.target.value)}/>
          </div>
          <div style={{flex:1}}>
            <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Hora inici</label>
            <input type="time" className="input" value={form.startTime} onChange={e=>set('startTime',e.target.value)}/>
          </div>
        </div>
        <div className="input-row">
          <div style={{flex:1}}>
            <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>{form.recurrence!=='none'?'Primera ocurrència':'Fi'}</label>
            <input type="date" className="input" value={form.endDate} onChange={e=>set('endDate',e.target.value)}/>
          </div>
          <div style={{flex:1}}>
            <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Hora fi</label>
            <input type="time" className="input" value={form.endTime} onChange={e=>set('endTime',e.target.value)}/>
          </div>
        </div>
        <div className="input-row">
          <div style={{flex:1}}>
            <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Recordatori</label>
            <select className="input" value={form.reminderMinutes} onChange={e=>set('reminderMinutes',+e.target.value)}>
              {REMINDER_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>
          <div style={{flex:1}}>
            <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Repetició</label>
            <select className="input" value={form.recurrence} onChange={e=>set('recurrence',e.target.value)}>
              {RECURRENCE_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>
        </div>
        {form.recurrence!=='none'&&(
          <div>
            <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>Fi de la repetició (opcional)</label>
            <input type="date" className="input" value={form.recurrenceEndDate}
              onChange={e=>set('recurrenceEndDate',e.target.value)}
              min={form.endDate||today}/>
          </div>
        )}
        <div>
          <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:5}}>Etiquetes</label>
          <div className="tag-input-wrap">
            {form.tags.map(tag=>{const c=tagColor(tag);return(
              <span key={tag} className="tag-pill" style={{background:c.bg,color:c.text}}>
                {tag}<button onClick={()=>set('tags',form.tags.filter(t=>t!==tag))}>×</button>
              </span>);})}
            <input className="tag-input" placeholder="etiqueta + Enter" value={tagInput}
              onChange={e=>setTagInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();addTag(tagInput);}}}/>
          </div>
        </div>
        {(()=>{
          const selList = lists.find(l=>l.id===form.listId);
          const listFields = selList?.fields||[];
          // Camps propis d'aquesta llista (no provenen dels "Camps per defecte"): es mostren a part.
          const customFields = listFields.filter(f=>!(defaultFields||[]).some(df=>df.name===f.name&&df.type===f.type));
          if(!customFields.length) return null;
          return (
            <div className="custom-fields-section">
              <div className="custom-fields-title"><span>Camps de la llista</span></div>
              {customFields.map(f=>(
                <div key={f.id} style={{marginBottom:10}}>
                  <label style={{fontSize:10,color:'var(--text3)',display:'block',marginBottom:3}}>{f.name}</label>
                  <CustomFieldInput field={f} value={form.customValues[f.id]} onChange={v=>set('customValues',{...form.customValues,[f.id]:v})}/>
                </div>
              ))}
            </div>
          );
        })()}
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel·lar</button>
          <button className="btn btn-primary" onClick={submit}>Crear tasca</button>
        </div>
      </div>
    </div>
  );
}

// ─── MATRIX VIEW ──────────────────────────────────────────────────────────────
// Quadrant: files = llistes, columnes = valors d'un "camp per defecte" de tipus llista (select).
// Es basa en les tasques ja filtrades a la pàgina principal (filtres d'estat, prioritat, etiqueta, etc.)
function MatrixView({tasks,lists,defaultFields,selectedTask,onSelectTask}) {
  const field = (defaultFields||[]).find(f=>f.type==='select'&&(f.options||[]).length>0);
  if (!field) {
    return (
      <div className="empty-state">
        {Ic.chart}
        <p>Defineix un "camp per defecte" de tipus llista (amb opcions, p. ex. "Llarg"/"Curt") per veure la matriu.</p>
      </div>
    );
  }
  const columns = field.options;
  const rowsLists = lists.filter(l=>tasks.some(t=>t.listId===l.id));
  return (
    <div className="matrix-view">
      {rowsLists.length===0 ? (
        <div className="empty-state">{Ic.chart}<p>Cap tasca per mostrar a la matriu.</p></div>
      ) : (
        <table className="matrix-table">
          <thead>
            <tr>
              <th>Llista</th>
              {columns.map(c=><th key={c}>{c}</th>)}
            </tr>
          </thead>
          <tbody>
            {rowsLists.map(l=>{
              const rowBg = hexToRgba(l.color,.10);
              return (
              <tr key={l.id}>
                <td style={{background:rowBg}}>
                  <div className="matrix-row-label">
                    <span style={{width:8,height:8,borderRadius:'50%',background:l.color,display:'inline-block',flexShrink:0}}/>
                    {l.name}
                  </div>
                </td>
                {columns.map(c=>{
                  const ts = tasks.filter(t=>t.listId===l.id&&(t.customValues||{})[field.id]===c);
                  return (
                    <td key={c} style={{background:rowBg}}>
                      {ts.length===0 ? <span className="matrix-empty-cell">—</span> : ts.map(t=>(
                        <div key={t.id} className={`matrix-task-chip ${selectedTask?.id===t.id?'selected':''} ${t.status==='completada'?'completada':''}`}
                          onClick={()=>onSelectTask(t)} style={{background:hexToRgba(l.color,.10)}}>
                          {t.title}
                        </div>
                      ))}
                    </td>
                  );
                })}
              </tr>
            );})}
          </tbody>
        </table>
      )}
    </div>
  );
}

// ─── CALENDAR VIEW ────────────────────────────────────────────────────────────
function CalendarView({tasks,lists,selectedTask,onSelectTask,onMoveTask,gcalToken,gcalEvents,setGcalEvents,gcalError,setGcalError,gcalCalendars}) {
  const now = new Date();
  const [year,setYear]   = useState(now.getFullYear());
  const [month,setMonth] = useState(now.getMonth());
  const [popup,setPopup] = useState(null);
  const popupRef = useRef(null);
  const [mode,setMode] = useState('month'); // 'month' | 'week'
  const mondayOf = d => { const x=new Date(d); x.setHours(12,0,0,0); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); return x; };
  const [weekStart,setWeekStart] = useState(()=>mondayOf(now));
  // ── Arrossegar tasques d'un dia a un altre (ratolí + tàctil) ──
  const dragRef = useRef(null);          // {task, startX, startY, active, ghost}
  const suppressClickRef = useRef(false); // evita obrir el detall just després d'arrossegar
  const [dragOverDate,setDragOverDate] = useState(null);
  // Demana confirmació abans de moure realment la tasca (evita canvis de dia accidentals,
  // especialment al mòbil/Android, on un lleuger arrossegament es pot confondre amb un toc).
  const [pendingMove,setPendingMove] = useState(null); // {task, newDateStr}
  const startChipDrag = (e, task) => {
    if (typeof e.button === 'number' && e.button !== 0) return; // només botó esquerre
    dragRef.current = {task, startX:e.clientX, startY:e.clientY, active:false, ghost:null};
    const move = ev => {
      const d = dragRef.current; if (!d) return;
      const dx = ev.clientX - d.startX, dy = ev.clientY - d.startY;
      if (!d.active) {
        if (Math.hypot(dx,dy) < 6) return; // llindar per no confondre amb un clic
        d.active = true;
        const g = document.createElement('div');
        g.className = 'cal-drag-ghost';
        g.textContent = task.title || '';
        document.body.appendChild(g);
        d.ghost = g;
        document.body.style.userSelect = 'none';
      }
      if (ev.cancelable) ev.preventDefault();
      d.ghost.style.left = ev.clientX + 'px';
      d.ghost.style.top  = ev.clientY + 'px';
      const el = document.elementFromPoint(ev.clientX, ev.clientY);
      const cell = el && el.closest('[data-datestr]');
      setDragOverDate(cell ? cell.getAttribute('data-datestr') : null);
    };
    const finish = ev => {
      const d = dragRef.current;
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', finish);
      window.removeEventListener('pointercancel', finish);
      document.body.style.userSelect = '';
      if (d) {
        if (d.ghost) d.ghost.remove();
        if (d.active) {
          suppressClickRef.current = true;
          if (ev.type === 'pointerup') {
            const el = document.elementFromPoint(ev.clientX, ev.clientY);
            const cell = el && el.closest('[data-datestr]');
            const ds = cell && cell.getAttribute('data-datestr');
            const anchor = d.task.endDate || d.task.startDate;
            if (ds && ds!==anchor && onMoveTask) setPendingMove({task:d.task, newDateStr:ds});
          }
        }
      }
      dragRef.current = null;
      setDragOverDate(null);
    };
    window.addEventListener('pointermove', move, {passive:false});
    window.addEventListener('pointerup', finish);
    window.addEventListener('pointercancel', finish);
  };
  useEffect(()=>{
    const h = e => {if(popupRef.current&&!popupRef.current.contains(e.target))setPopup(null);};
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[]);
  const prevMonth = ()=>{if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);};
  const nextMonth = ()=>{if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);};
  const shiftWeek = n => setWeekStart(w=>{const x=new Date(w);x.setDate(x.getDate()+n*7);return x;});
  const goPrev  = ()=> mode==='week' ? shiftWeek(-1) : prevMonth();
  const goNext  = ()=> mode==='week' ? shiftWeek(1)  : nextMonth();
  const goToday = ()=>{ setYear(now.getFullYear()); setMonth(now.getMonth()); setWeekStart(mondayOf(now)); };
  const firstDay = new Date(year,month,1);
  const lastDay  = new Date(year,month+1,0);
  const startOffset = (firstDay.getDay()+6)%7;
  let cells;
  if (mode==='week') {
    cells = Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(d.getDate()+i);return {date:d,dateStr:ymd(d),inMonth:true};});
  } else {
    const totalCells = Math.ceil((startOffset+lastDay.getDate())/7)*7;
    cells = Array.from({length:totalCells},(_,i)=>{const d=new Date(year,month,1-startOffset+i);return {date:d,dateStr:ymd(d),inMonth:d.getMonth()===month};});
  }
  const rangeKey = cells[0].dateStr+'_'+cells[cells.length-1].dateStr;
  // Carrega els esdeveniments de Google Calendar per al mes visible
  const activeGcalCalendars = (gcalCalendars||[]).filter(c=>c.active!==false);
  useEffect(()=>{
    if (!gcalToken || !activeGcalCalendars.length) { setGcalEvents([]); return; }
    let cancelled = false;
    Promise.allSettled(activeGcalCalendars.map(cal=>
      fetchGcalEvents(gcalToken, cal.id, cells[0].dateStr, cells[cells.length-1].dateStr, cal)
    )).then(results=>{
      if (cancelled) return;
      const ok = results.filter(r=>r.status==='fulfilled').flatMap(r=>r.value);
      const failed = activeGcalCalendars.filter((_,i)=>results[i].status==='rejected');
      setGcalEvents(ok);
      setGcalError(failed.length
        ? `No s'han pogut carregar els esdeveniments de: ${failed.map(c=>c.label||c.id).join(', ')}. Torna a connectar o revisa l'ID/permisos.`
        : '');
    });
    return ()=>{cancelled=true;};
  },[gcalToken,rangeKey,JSON.stringify(activeGcalCalendars)]);
  // Etiqueta d'hora per a una tasca dins del calendari: "09:00-10:00", nomes l'inici, nomes la fi, o buit (tot el dia).
  const calTimeLabel = t => {
    if (t.startTime && t.endTime && t.startTime!==t.endTime) return `${t.startTime}-${t.endTime}`;
    return t.startTime || t.endTime || '';
  };
  const tasksForDay = dateStr => tasks.filter(t=>{
    // Cada ocurrència d'una tasca recurrent es mostra només el seu propi dia
    if (t.seriesId) return t.endDate === dateStr;
    const start=t.startDate||t.endDate; const end=t.endDate||t.startDate;
    if(!start)return false; return start<=dateStr&&dateStr<=end;
  }).sort((a,b)=>{
    // Ordena per hora d'inici ascendent; les tasques sense hora (tot el dia) van primer.
    const ta = a.startTime||a.endTime||''; const tb = b.startTime||b.endTime||'';
    return ta<tb?-1:ta>tb?1:0;
  });
  const gcalForDay = dateStr => gcalEvents.filter(e=>e.dateStr===dateStr);
  const monthName = firstDay.toLocaleDateString('ca-ES',{month:'long',year:'numeric'});
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate()+6);
  const weekLabel = `${weekStart.toLocaleDateString('ca-ES',{day:'numeric',month:'short'})} – ${weekEnd.toLocaleDateString('ca-ES',{day:'numeric',month:'short',year:'numeric'})}`;
  const DAYS = ['Dl','Dt','Dc','Dj','Dv','Ds','Dg'];
  return (
    <div className="cal-wrap">
      <div className="cal-nav">
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <button className="cal-nav-btn" onClick={goPrev}>{Ic.chevL}</button>
          <button className="cal-nav-btn" onClick={goNext}>{Ic.chevR}</button>
          <h2 style={{marginLeft:8}}>{mode==='week'?weekLabel:monthName}</h2>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <div className="cal-mode-toggle">
            <button className={`cal-mode-btn ${mode==='month'?'active':''}`} onClick={()=>setMode('month')}>Mes</button>
            <button className={`cal-mode-btn ${mode==='week'?'active':''}`} onClick={()=>setMode('week')}>Setmana</button>
          </div>
          <button className="btn btn-ghost" style={{fontSize:12,padding:'5px 12px'}} onClick={goToday}>Avui</button>
        </div>
      </div>
      <div className={`cal-grid ${mode==='week'?'cal-grid-week':''}`}>
        {mode!=='week'&&DAYS.map(d=><div key={d} className="cal-dow">{d}</div>)}
        {cells.map(({date,dateStr,inMonth})=>{
          const dayTasks = tasksForDay(dateStr);
          const dayGcal  = gcalForDay(dateStr);
          const isToday  = dateStr===today;
          const MAX=mode==='week'?12:3; const visible=dayTasks.slice(0,MAX); const extraTasks=dayTasks.length-MAX;
          const gcalVisible = dayGcal.slice(0,Math.max(0,MAX-visible.length));
          const extra = extraTasks + (dayGcal.length-gcalVisible.length);
          const isPopup  = popup?.dateStr===dateStr;
          return (
            <div key={dateStr} data-datestr={dateStr}
              className={`cal-day ${isToday?'today':''} ${!inMonth?'other-month':''} ${dragOverDate===dateStr?'drag-over':''}`}
              onClick={()=>(dayTasks.length>0||dayGcal.length>0)&&setPopup(isPopup?null:{dateStr})}>
              {mode==='week'&&<div className="cal-week-wd">{date.toLocaleDateString('ca-ES',{weekday:'long'})}</div>}
              <div className="cal-day-num">{date.getDate()}</div>
              {visible.map(t=>{
                const list=lists.find(l=>l.id===t.listId);
                const overdue=isOverdue(t);
                const chipBg=list?hexToRgba(list.color,.10):'rgba(79,142,247,.10)';
                return <div key={t.id} className="cal-task-chip cal-task-chip-drag"
                  style={{background:chipBg,color:'var(--text)'}}
                  onPointerDown={e=>startChipDrag(e,t)}
                  onClick={e=>{e.stopPropagation(); if(suppressClickRef.current){suppressClickRef.current=false;return;} onSelectTask(t);setPopup(null);}}
                  title={t.title}>{t.status==='completada'?'✓ ':overdue?'⚠ ':''}{calTimeLabel(t)?`${calTimeLabel(t)} `:''}{t.title}</div>;
              })}
              {gcalVisible.map((e,i)=>(
                <div key={`g${i}`} className="cal-task-chip cal-gcal-chip"
                  style={{background:(e.color||'#4f8ef7')+'22',color:e.color||'#4f8ef7'}}
                  onClick={ev=>ev.stopPropagation()}
                  title={`${e.calLabel||'Google Calendar'}: ${e.title}`}>📅 {e.time?`${e.time} `:''}{e.title}</div>
              ))}
              {extra>0&&<div className="cal-more">+{extra} més</div>}
              {isPopup&&(dayTasks.length>MAX||dayGcal.length>0)&&(
                <div ref={popupRef} className="cal-day-tasks-popup" onClick={e=>e.stopPropagation()}>
                  <h4>{date.toLocaleDateString('ca-ES',{day:'numeric',month:'long'})}</h4>
                  {dayTasks.map(t=>{
                    const list=lists.find(l=>l.id===t.listId);
                    const overdue=isOverdue(t);
                    return <div key={t.id} className="cal-popup-task" onClick={()=>{onSelectTask(t);setPopup(null);}}>
                      <span className={`priority-dot p-${t.priority}`}/>
                      {calTimeLabel(t)&&<span style={{fontSize:10,color:'var(--text3)',minWidth:36}}>{calTimeLabel(t)}</span>}
                      <span style={{flex:1,color:overdue?'var(--danger)':undefined}}>{overdue?'⚠ ':''}{t.title}</span>
                      {list&&<span style={{fontSize:10,color:list.color}}>{list.name}</span>}
                    </div>;
                  })}
                  {dayGcal.map((e,i)=>(
                    <div key={`g${i}`} className="cal-popup-task">
                      <span style={{fontSize:12}}>📅</span>
                      <span style={{flex:1}}>{e.time?`${e.time} `:''}{e.title}</span>
                      <span style={{fontSize:10,color:e.color||'#4f8ef7'}}>{e.calLabel||'Google'}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {gcalError&&<p style={{fontSize:12,color:'var(--danger)',marginTop:10}}>{gcalError}</p>}
      <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:14,fontSize:11,color:'var(--text3)'}}>
        {lists.map(l=><span key={l.id} style={{display:'flex',alignItems:'center',gap:4}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:l.color,display:'inline-block'}}/>{l.name}
        </span>)}
        {gcalToken&&activeGcalCalendars.map(cal=>(
          <span key={cal.id} style={{display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:cal.color||'#4f8ef7',display:'inline-block'}}/>{cal.label||cal.id}
          </span>
        ))}
      </div>
      {pendingMove&&<ConfirmMoveModal task={pendingMove.task} newDateStr={pendingMove.newDateStr}
        onConfirm={()=>{onMoveTask(pendingMove.task,pendingMove.newDateStr);setPendingMove(null);}}
        onClose={()=>setPendingMove(null)}/>}
    </div>
  );
}

// ─── SEGUIMENT VIEW ───────────────────────────────────────────────────────────
// Genera totes les ocurrències futures d'una tasca dins del rang [startStr, endStr]
function getTaskOccurrences(task, startStr, endStr) {
  const dates = new Set();
  if (!task.endDate) return dates;
  // Troba la primera ocurrència >= startStr
  let cur = task.endDate;
  // Si la tasca és recurrent i cur < startStr, avança fins arribar al rang
  if (task.recurrence && task.recurrence !== 'none') {
    let safety = 0;
    while (cur < startStr && safety < 500) {
      const nx = nextOccurrence(cur, task.recurrence);
      if (!nx || (task.recurrenceEndDate && nx > task.recurrenceEndDate)) break;
      cur = nx; safety++;
    }
  }
  // Afegeix ocurrències dins del rang
  let safety = 0;
  while (cur <= endStr && safety < 500) {
    if (cur >= startStr) dates.add(cur);
    if (!task.recurrence || task.recurrence === 'none') break;
    const nx = nextOccurrence(cur, task.recurrence);
    if (!nx || (task.recurrenceEndDate && nx > task.recurrenceEndDate)) break;
    cur = nx; safety++;
  }
  return dates;
}

function getSeriesStart(task) {
  // Data d'inici de la sèrie: createdAt > startDate > endDate
  if (task.createdAt?.toDate) return ymd(task.createdAt.toDate());
  if (task.startDate) return task.startDate;
  return task.endDate || today;
}

function getPeriodDays(seriesStart, period) {
  const start = new Date(seriesStart + 'T12:00');
  const end = new Date(seriesStart + 'T12:00');
  if (period==='1m') end.setMonth(end.getMonth()+1);
  else if (period==='3m') end.setMonth(end.getMonth()+3);
  else end.setFullYear(end.getFullYear()+1);
  const days = [];
  const d = new Date(start);
  while (d <= end) { days.push(ymd(d)); d.setDate(d.getDate()+1); }
  return days;
}

function SeguimentView({tasks, completionLogs, lists}) {
  const [period, setPeriod] = useState('1m');

  // Agrupa tasques seguides per seriesId (o per id si no és sèrie)
  const trackedAll = tasks.filter(t=>t.tracked);
  // Deduplicar per sèrie: un representant per seriesId
  const seriesMap = {};
  trackedAll.forEach(t => {
    const key = t.seriesId || t.id;
    if (!seriesMap[key]) seriesMap[key] = { rep: t, instances: [] };
    seriesMap[key].instances.push(t);
  });
  const seriesList = Object.values(seriesMap);

  const taskData = seriesList.map(({ rep, instances }) => {
    const seriesStart = getSeriesStart(rep);
    const days = getPeriodDays(seriesStart, period);
    const startStr = days[0];
    const endStr   = days[days.length-1];

    // Potencials: instàncies dins del rang
    const potentialDates = new Set(
      instances.filter(t=>t.endDate>=startStr&&t.endDate<=endStr).map(t=>t.endDate)
    );
    // Completions: instàncies completades dins del rang
    const completedDates = new Set(
      instances.filter(t=>t.status==='completada'&&t.endDate>=startStr&&t.endDate<=endStr).map(t=>t.endDate)
    );

    const logsForHeatmap = {};
    potentialDates.forEach(d => {
      if (completedDates.has(d))  logsForHeatmap[d] = 1;
      else if (d < today)         logsForHeatmap[d] = -1;
      else                        logsForHeatmap[d] = 0.5;
    });

    return { task: rep, days, occCount: potentialDates.size, compCount: completedDates.size, logsForHeatmap };
  });

  if (seriesList.length===0) return (
    <div className="seg-wrap">
      <div style={{marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:16,fontWeight:600}}>Seguiment de tasques</span>
      </div>
      <div className="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <p>Cap tasca en seguiment.<br/>Fes clic al 🔖 d'una tasca per afegir-la al seguiment.</p>
      </div>
    </div>
  );

  return (
    <div className="seg-wrap">
      <div style={{marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <span style={{fontSize:16,fontWeight:600}}>Seguiment de tasques</span>
        <div className="seg-period">
          {[['1m','1 mes'],['3m','3 mesos'],['1y','1 any']].map(([v,l])=>(
            <button key={v} className={`filter-chip ${period===v?'active':''}`} onClick={()=>setPeriod(v)}>{l}</button>
          ))}
        </div>
      </div>

      <div className="stats-cards">
        <div className="stats-card">
          <div className="stats-card-num" style={{color:'var(--warn)'}}>{seriesList.length}</div>
          <div className="stats-card-label">Tasques seguides</div>
        </div>
      </div>

      {taskData.map(({task, days, occCount, compCount, logsForHeatmap, seriesStart, endStr})=>{
        const list = lists.find(l=>l.id===task.listId);
        const color = list?.color||'var(--accent)';
        const recLabel = RECURRENCE_OPTIONS.find(r=>r.value===task.recurrence&&task.recurrence!=='none')?.label;
        return (
          <div key={task.id} className="tracked-card">
            <div className="tracked-task-header">
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span className={`priority-dot p-${task.priority}`}/>
                <span style={{fontSize:14,fontWeight:500}}>{task.title}</span>
                {list&&<span style={{fontSize:11,color:list.color}}>{list.name}</span>}
                {recLabel&&<span className="recurrence-chip">🔁 {recLabel}</span>}
              </div>
              <span style={{fontSize:12,fontWeight:600,color:'var(--text2)',flexShrink:0}}>
                {compCount}/{occCount} · {occCount>0?Math.round(compCount/occCount*100):0}%
              </span>
            </div>
            <Heatmap days={days} logs={logsForHeatmap} color={color} period={period}/>
          </div>
        );
      })}
    </div>
  );
}

function Heatmap({days, logs, color, period}) {
  // logs[d]: 1=completat, 0.5=pendent/futur, -1=perdut, undefined=no programat
  const sqColor = (d) => {
    const v = logs[d];
    if (v===1)   return {bg:color,     op:1,    title:'Completat'};
    if (v===-1)  return {bg:'var(--danger)', op:0.5, title:'No completat'};
    if (v===0.5) return {bg:color,     op:0.25, title:'Programat'};
    return              {bg:'var(--border)',  op:0.2,  title:'—'};
  };

  if (period==='1m') {
    return (
      <div>
        <div style={{display:'flex',gap:2,flexWrap:'wrap',marginBottom:4}}>
          {days.map(d=>{
            const {bg,op,title} = sqColor(d);
            return <div key={d} className="heatmap-sq" title={`${fmt(d)}: ${title}`}
              style={{width:16,height:16,background:bg,opacity:op}}/>;
          })}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text3)',marginTop:2}}>
          <span>{fmt(days[0])}</span><span>{fmt(days[days.length-1])}</span>
        </div>
      </div>
    );
  }
  // Group into weeks (Mon-start)
  const weeks = [];
  let week = [];
  const startDow = (new Date(days[0]+'T12:00').getDay()+6)%7;
  for (let i=0;i<startDow;i++) week.push(null);
  days.forEach(d=>{
    week.push(d);
    if (week.length===7) { weeks.push(week); week=[]; }
  });
  if (week.length>0) weeks.push(week);

  const sq = period==='1y'?10:13;
  return (
    <div style={{overflowX:'auto'}}>
      <div style={{display:'flex',gap:2,minWidth:'max-content'}}>
        {weeks.map((w,wi)=>(
          <div key={wi} style={{display:'flex',flexDirection:'column',gap:2}}>
            {w.map((d,di)=>{
              if (!d) return <div key={di} style={{width:sq,height:sq}}/>;
              const {bg,op,title} = sqColor(d);
              return <div key={d} className="heatmap-sq" title={`${fmt(d)}: ${title}`}
                style={{width:sq,height:sq,background:bg,opacity:op}}/>;
            })}
          </div>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text3)',marginTop:3}}>
        <span>{fmt(days[0])}</span><span>{fmt(days[days.length-1])}</span>
      </div>
    </div>
  );
}

// ─── GANTT VIEW ───────────────────────────────────────────────────────────────
function GanttView({tasks,lists,defaultList,assignedFilter,currentUserUid,matchesSearch,selectedTask,onSelectTask,onUpdateDates}) {
  const DAY_W=24, DAYS=60, ROW_H=38, LABEL_W=210;
  const [ganttList,setGanttList]=useState(defaultList||'all');
  const [offset,setOffset]=useState(0);
  const scrollRef=useRef(null);
  const dragRef=useRef(null);
  const draggedRef=useRef(false);
  const [dragPreview,setDragPreview]=useState(null); // {taskId, si, ei}

  const winStart=(()=>{const d=new Date();d.setDate(d.getDate()-7+offset);return d;})();
  const winStartStr=ymd(winStart);
  const winEnd=new Date(winStart);winEnd.setDate(winEnd.getDate()+DAYS-1);
  const winEndStr=ymd(winEnd);

  const days=[];
  for(let i=0;i<DAYS;i++){
    const d=new Date(winStart);d.setDate(d.getDate()+i);
    days.push({str:ymd(d),d,isWeekend:[0,6].includes(d.getDay()),isToday:ymd(d)===today});
  }
  const months=[];
  days.forEach((day,i)=>{
    const label=day.d.toLocaleDateString('ca-ES',{month:'long',year:'numeric'});
    if(!months.length||months[months.length-1].label!==label) months.push({label,count:1});
    else months[months.length-1].count++;
  });
  const dayIdx=str=>{const diff=new Date(str+'T12:00')-winStart;return Math.floor(diff/86400000);};
  const todayIdx=days.findIndex(d=>d.isToday);
  useEffect(()=>{
    if(scrollRef.current&&todayIdx>=0){
      const x=LABEL_W+todayIdx*DAY_W-200;
      scrollRef.current.scrollLeft=Math.max(0,x);
    }
  },[offset]);
  // Arrossegar la barra (mode 'move') o les vores ('start'/'end') per canviar les dates.
  const idxToDate=idx=>{const x=new Date(winStart);x.setDate(x.getDate()+idx);return ymd(x);};
  const startBarDrag=(e,t,mode,si,ei)=>{
    e.stopPropagation();
    if(typeof e.button==='number'&&e.button!==0) return;
    dragRef.current={taskId:t.id,mode,si,ei,startX:e.clientX,curSi:si,curEi:ei,moved:false};
    document.body.style.userSelect='none';
    const move=ev=>{
      const d=dragRef.current; if(!d) return;
      const delta=Math.round((ev.clientX-d.startX)/DAY_W);
      let nsi=d.si,nei=d.ei;
      if(d.mode==='move'){nsi=d.si+delta;nei=d.ei+delta;}
      else if(d.mode==='start'){nsi=Math.min(d.si+delta,d.ei);}
      else if(d.mode==='end'){nei=Math.max(d.ei+delta,d.si);}
      if(nsi!==d.curSi||nei!==d.curEi){d.curSi=nsi;d.curEi=nei;d.moved=true;draggedRef.current=true;setDragPreview({taskId:d.taskId,si:nsi,ei:nei});}
      if(ev.cancelable) ev.preventDefault();
    };
    const finish=()=>{
      const d=dragRef.current;
      window.removeEventListener('pointermove',move);
      window.removeEventListener('pointerup',finish);
      window.removeEventListener('pointercancel',finish);
      document.body.style.userSelect='';
      if(d&&d.moved&&onUpdateDates){
        onUpdateDates(d.taskId,{startDate:idxToDate(d.curSi),endDate:idxToDate(d.curEi)});
      }
      dragRef.current=null;
      setDragPreview(null);
      setTimeout(()=>{draggedRef.current=false;},0);
    };
    window.addEventListener('pointermove',move,{passive:false});
    window.addEventListener('pointerup',finish);
    window.addEventListener('pointercancel',finish);
  };

  const visibleTasks=tasks.filter(t=>{
    if (assignedFilter) {
      if (assignedFilter.type==='to' && !(t.ownerId===currentUserUid && t.assigneeId===assignedFilter.uid)) return false;
      if (assignedFilter.type==='by' && !(t.assigneeId===currentUserUid && t.ownerId===assignedFilter.uid)) return false;
    } else if (ganttList!=='all'&&t.listId!==ganttList) return false;
    if (matchesSearch&&!matchesSearch(t)) return false;
    const s=t.startDate||t.endDate;const e=t.endDate||t.startDate;
    return s&&e>=winStartStr&&s<=winEndStr;
  }).sort((a,b)=>(a.startDate||a.endDate||'').localeCompare(b.startDate||b.endDate||''));

  const headerH=57; // month (28) + day (29)
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
      {/* Toolbar */}
      <div style={{padding:'9px 16px',display:'flex',alignItems:'center',gap:8,borderBottom:'1px solid var(--border)',flexShrink:0}}>
        {assignedFilter ? (
          <span className="tag" style={{background:'rgba(79,142,247,.12)',color:'var(--accent)'}}>
            {Ic.person} {assignedFilter.type==='to'?'Assignades a':'Assignades per'} — filtre actiu
          </span>
        ) : (
          <select className="input" style={{width:175}} value={ganttList} onChange={e=>setGanttList(e.target.value)}>
            <option value="all">Totes les llistes</option>
            {lists.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
        )}
        <button className="btn btn-ghost" style={{padding:'5px 10px',fontSize:12}} onClick={()=>setOffset(o=>o-30)}>← Anterior</button>
        <button className="btn btn-ghost" style={{padding:'5px 10px',fontSize:12}} onClick={()=>setOffset(0)}>Avui</button>
        <button className="btn btn-ghost" style={{padding:'5px 10px',fontSize:12}} onClick={()=>setOffset(o=>o+30)}>Següent →</button>
        <span style={{marginLeft:'auto',fontSize:11,color:'var(--text3)'}}>{visibleTasks.length} tasques</span>
      </div>

      {/* Body: scrollable */}
      <div ref={scrollRef} style={{flex:1,overflow:'auto',position:'relative'}}>
        <div style={{minWidth:LABEL_W+DAYS*DAY_W}}>

          {/* Sticky header */}
          <div style={{position:'sticky',top:0,zIndex:5,display:'flex',background:'var(--bg)'}}>
            {/* Corner */}
            <div style={{width:LABEL_W,minWidth:LABEL_W,flexShrink:0,height:headerH,borderRight:'1px solid var(--border)',borderBottom:'1px solid var(--border)',position:'sticky',left:0,zIndex:6,background:'var(--bg)',display:'flex',alignItems:'center',padding:'0 10px',fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em'}}>
              Tasca
            </div>
            {/* Months + days */}
            <div style={{display:'flex',flexDirection:'column',flex:1}}>
              {/* Month row */}
              <div style={{display:'flex',height:28,borderBottom:'1px solid var(--border)'}}>
                {months.map((m,i)=>(
                  <div key={i} style={{width:m.count*DAY_W,flexShrink:0,borderRight:'1px solid var(--border)',fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.04em',padding:'0 8px',display:'flex',alignItems:'center',overflow:'hidden'}}>
                    {m.label}
                  </div>
                ))}
              </div>
              {/* Day row */}
              <div style={{display:'flex',height:29,borderBottom:'1px solid var(--border)'}}>
                {days.map((day,i)=>(
                  <div key={i} style={{
                    width:DAY_W,flexShrink:0,textAlign:'center',
                    borderRight:'1px solid var(--border)',
                    background:day.isToday?'rgba(79,142,247,.1)':day.isWeekend?'var(--bg2)':'transparent',
                    color:day.isToday?'var(--accent)':day.isWeekend?'var(--text3)':'var(--text2)',
                    fontSize:9,fontWeight:day.isToday?700:400,
                    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1
                  }}>
                    <span>{day.d.getDate()}</span>
                    <span style={{opacity:.6}}>{day.d.toLocaleDateString('ca-ES',{weekday:'narrow'})}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Rows */}
          {visibleTasks.length===0 ? (
            <div style={{display:'flex'}}>
              <div style={{width:LABEL_W,minWidth:LABEL_W,flexShrink:0,position:'sticky',left:0,background:'var(--bg)',zIndex:3,borderRight:'1px solid var(--border)'}}/>
              <div className="empty-state" style={{flex:1,padding:'50px 20px'}}>{Ic.calendar}<p>Cap tasca amb dates en aquest període.</p></div>
            </div>
          ) : visibleTasks.map((t,ti)=>{
            const list=lists.find(l=>l.id===t.listId);
            const color=list?.color||'#4f8ef7';
            const s=t.startDate||t.endDate;
            const e=t.endDate||t.startDate;
            const si=dayIdx(s),ei=dayIdx(e);
            const previewing=dragPreview&&dragPreview.taskId===t.id;
            const dsi=previewing?dragPreview.si:si;
            const dei=previewing?dragPreview.ei:ei;
            const barLeft=Math.max(0,dsi)*DAY_W+2;
            const barW=Math.max(DAY_W-4,(Math.min(DAYS-1,dei)-Math.max(0,dsi)+1)*DAY_W-4);
            const isSelected=selectedTask?.id===t.id;
            const isDone=t.status==='completada';
            return (
              <div key={t.id} style={{display:'flex',height:ROW_H,borderBottom:'1px solid var(--border)',cursor:'pointer'}}
                onClick={()=>{if(draggedRef.current)return;onSelectTask(t===selectedTask?null:t);}}>
                {/* Label */}
                <div style={{
                  width:LABEL_W,minWidth:LABEL_W,flexShrink:0,display:'flex',alignItems:'center',gap:7,padding:'0 10px',
                  position:'sticky',left:0,zIndex:3,
                  background:isSelected?'rgba(79,142,247,.15)':list?hexToRgba(color,.10):'var(--bg)',
                  borderRight:'1px solid var(--border)',overflow:'hidden',transition:'background .1s'
                }}>
                  <span style={{width:7,height:7,borderRadius:'50%',background:color,flexShrink:0}}/>
                  <span style={{fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',opacity:isDone?.45:1,fontWeight:700}}>{t.title}</span>
                </div>
                {/* Timeline */}
                <div style={{flex:1,position:'relative',background:ti%2===0?'transparent':'rgba(0,0,0,.013)'}}>
                  {/* Weekend cols */}
                  {days.map((day,di)=>day.isWeekend?(
                    <div key={di} style={{position:'absolute',top:0,left:di*DAY_W,width:DAY_W,height:'100%',background:'var(--bg2)',opacity:.45,pointerEvents:'none'}}/>
                  ):null)}
                  {/* Today line */}
                  {todayIdx>=0&&(
                    <div style={{position:'absolute',top:0,left:todayIdx*DAY_W+DAY_W/2-1,width:2,height:'100%',background:'var(--accent)',opacity:.3,pointerEvents:'none'}}/>
                  )}
                  {/* Bar */}
                  {dsi<=DAYS-1&&dei>=0&&(
                    <div title="Arrossega per moure · arrossega les vores per canviar l'inici o el final"
                      onPointerDown={e=>startBarDrag(e,t,'move',si,ei)}
                      style={{
                      position:'absolute',left:barLeft,top:7,width:barW,height:24,
                      background:isDone?'var(--bg3)':hexToRgba(color,.82),
                      borderRadius:5,border:`1.5px solid ${isDone?'var(--border)':color}`,
                      display:'flex',alignItems:'center',padding:'0 7px',overflow:'hidden',
                      opacity:isDone?.45:1,
                      boxShadow:isSelected?`0 0 0 2px ${color}`:(previewing?`0 0 0 2px ${color}`:undefined),
                      transition:'box-shadow .1s',cursor:'grab',touchAction:'none',userSelect:'none'
                    }}>
                      <div onPointerDown={e=>startBarDrag(e,t,'start',si,ei)} title="Canvia la data d'inici"
                        style={{position:'absolute',left:0,top:0,width:9,height:'100%',cursor:'ew-resize',touchAction:'none'}}/>
                      <div onPointerDown={e=>startBarDrag(e,t,'end',si,ei)} title="Canvia la data final"
                        style={{position:'absolute',right:0,top:0,width:9,height:'100%',cursor:'ew-resize',touchAction:'none'}}/>
                      {barW>55&&<span style={{fontSize:10,fontWeight:500,color:'white',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',textShadow:'0 1px 3px rgba(0,0,0,.45)',pointerEvents:'none'}}>
                        {t.title}
                      </span>}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
