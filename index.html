// ─── CALENDAR VIEW ────────────────────────────────────────────────────────────
function CalendarView({tasks,lists,selectedTask,onSelectTask,gcalToken,gcalEvents,setGcalEvents,gcalError,setGcalError,gcalCalendars}) {
  const now = new Date();
  const [year,setYear]   = useState(now.getFullYear());
  const [month,setMonth] = useState(now.getMonth());
  const [popup,setPopup] = useState(null);
  const popupRef = useRef(null);
  useEffect(()=>{
    const h = e => {if(popupRef.current&&!popupRef.current.contains(e.target))setPopup(null);};
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[]);
  const prevMonth = ()=>{if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);};
  const nextMonth = ()=>{if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);};
  const firstDay = new Date(year,month,1);
  const lastDay  = new Date(year,month+1,0);
  const startOffset = (firstDay.getDay()+6)%7;
  const totalCells  = Math.ceil((startOffset+lastDay.getDate())/7)*7;
  const cells = Array.from({length:totalCells},(_,i)=>{
    const d = new Date(year,month,1-startOffset+i);
    return {date:d,dateStr:ymd(d),inMonth:d.getMonth()===month};
  });
  // Carrega els esdeveniments de Google Calendar per al mes visible
  const activeGcalCalendars = (gcalCalendars||[]).filter(c=>c.active!==false);
  useEffect(()=>{
    if (!gcalToken || !activeGcalCalendars.length) { setGcalEvents([]); return; }
    let cancelled = false;
    Promise.all(activeGcalCalendars.map(cal=>
      fetchGcalEvents(gcalToken, cal.id, cells[0].dateStr, cells[cells.length-1].dateStr, cal)
        .catch(()=>{throw new Error('gcal-fetch-failed');})
    )).then(results=>{if(!cancelled){setGcalEvents(results.flat());setGcalError('');}})
      .catch(()=>{if(!cancelled)setGcalError('No s\'han pogut carregar els esdeveniments de Google Calendar. Torna a connectar.');});
    return ()=>{cancelled=true;};
  },[gcalToken,year,month,JSON.stringify(activeGcalCalendars)]);
  const tasksForDay = dateStr => tasks.filter(t=>{
    // Cada ocurrència d'una tasca recurrent es mostra només el seu propi dia
    if (t.seriesId) return t.endDate === dateStr;
    const start=t.startDate||t.endDate; const end=t.endDate||t.startDate;
    if(!start)return false; return start<=dateStr&&dateStr<=end;
  });
  const gcalForDay = dateStr => gcalEvents.filter(e=>e.dateStr===dateStr);
  const monthName = firstDay.toLocaleDateString('ca-ES',{month:'long',year:'numeric'});
  const DAYS = ['Dl','Dt','Dc','Dj','Dv','Ds','Dg'];
  return (
    <div className="cal-wrap">
      <div className="cal-nav">
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <button className="cal-nav-btn" onClick={prevMonth}>{Ic.chevL}</button>
          <button className="cal-nav-btn" onClick={nextMonth}>{Ic.chevR}</button>
          <h2 style={{marginLeft:8}}>{monthName}</h2>
        </div>
        <button className="btn btn-ghost" style={{fontSize:12,padding:'5px 12px'}}
          onClick={()=>{setYear(now.getFullYear());setMonth(now.getMonth());}}>Avui</button>
      </div>
      <div className="cal-grid">
        {DAYS.map(d=><div key={d} className="cal-dow">{d}</div>)}
        {cells.map(({date,dateStr,inMonth})=>{
          const dayTasks = tasksForDay(dateStr);
          const dayGcal  = gcalForDay(dateStr);
          const isToday  = dateStr===today;
          const MAX=3; const visible=dayTasks.slice(0,MAX); const extraTasks=dayTasks.length-MAX;
          const gcalVisible = dayGcal.slice(0,Math.max(0,MAX-visible.length));
          const extra = extraTasks + (dayGcal.length-gcalVisible.length);
          const isPopup  = popup?.dateStr===dateStr;
          return (
            <div key={dateStr} className={`cal-day ${isToday?'today':''} ${!inMonth?'other-month':''}`}
              onClick={()=>(dayTasks.length>0||dayGcal.length>0)&&setPopup(isPopup?null:{dateStr})}>
              <div className="cal-day-num">{date.getDate()}</div>
              {visible.map(t=>{
                const list=lists.find(l=>l.id===t.listId);
                const overdue=isOverdue(t);
                const color=overdue?'var(--danger)':(list?.color||'var(--accent)');
                return <div key={t.id} className="cal-task-chip"
                  style={{background:color+'22',color}}
                  onClick={e=>{e.stopPropagation();onSelectTask(t);setPopup(null);}}
                  title={t.title}>{t.status==='completada'?'✓ ':overdue?'⚠ ':''}{t.title}</div>;
              })}
              {gcalVisible.map((e,i)=>(
                <div key={`g${i}`} className="cal-task-chip cal-gcal-chip"
                  style={{background:(e.color||'#4f8ef7')+'22',color:e.color||'#4f8ef7'}}
                  onClick={ev=>ev.stopPropagation()}
                  title={`${e.calLabel||'Google Calendar'}: ${e.title}`}>📅 {e.time?`${e.time} `:''}{e.title}</div>
              ))}
              {extra>0&&<div className="cal-more">+{extra} més</div>}
              {isPopup&&(dayTasks.length>MAX||dayGcal.length>0)&&(
                <div ref={popupRef} className="cal-day-tasks-popup" onClick={e=>e.stopPropagation()}>
                  <h4>{date.toLocaleDateString('ca-ES',{day:'numeric',month:'long'})}</h4>
                  {dayTasks.map(t=>{
                    const list=lists.find(l=>l.id===t.listId);
                    const overdue=isOverdue(t);
                    return <div key={t.id} className="cal-popup-task" onClick={()=>{onSelectTask(t);setPopup(null);}}>
                      <span className={`priority-dot p-${t.priority}`}/>
                      <span style={{flex:1,color:overdue?'var(--danger)':undefined}}>{overdue?'⚠ ':''}{t.title}</span>
                      {list&&<span style={{fontSize:10,color:list.color}}>{list.name}</span>}
                    </div>;
                  })}
                  {dayGcal.map((e,i)=>(
                    <div key={`g${i}`} className="cal-popup-task">
                      <span style={{fontSize:12}}>📅</span>
                      <span style={{flex:1}}>{e.time?`${e.time} `:''}{e.title}</span>
                      <span style={{fontSize:10,color:e.color||'#4f8ef7'}}>{e.calLabel||'Google'}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {gcalError&&<p style={{fontSize:12,color:'var(--danger)',marginTop:10}}>{gcalError}</p>}
      <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:14,fontSize:11,color:'var(--text3)'}}>
        {lists.map(l=><span key={l.id} style={{display:'flex',alignItems:'center',gap:4}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:l.color,display:'inline-block'}}/>{l.name}
        </span>)}
        {gcalToken&&activeGcalCalendars.map(cal=>(
          <span key={cal.id} style={{display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:cal.color||'#4f8ef7',display:'inline-block'}}/>{cal.label||cal.id}
          </span>
        ))}
      </div>
    </div>
  );
}

// ─── SEGUIMENT VIEW ───────────────────────────────────────────────────────────
// Genera totes les ocurrències futures d'una tasca dins del rang [startStr, endStr]
function getTaskOccurrences(task, startStr, endStr) {
  const dates = new Set();
  if (!task.endDate) return dates;
  // Troba la primera ocurrència >= startStr
  let cur = task.endDate;
  // Si la tasca és recurrent i cur < startStr, avança fins arribar al rang
  if (task.recurrence && task.recurrence !== 'none') {
    let safety = 0;
    while (cur < startStr && safety < 500) {
      const nx = nextOccurrence(cur, task.recurrence);
      if (!nx || (task.recurrenceEndDate && nx > task.recurrenceEndDate)) break;
      cur = nx; safety++;
    }
  }
  // Afegeix ocurrències dins del rang
  let safety = 0;
  while (cur <= endStr && safety < 500) {
    if (cur >= startStr) dates.add(cur);
    if (!task.recurrence || task.recurrence === 'none') break;
    const nx = nextOccurrence(cur, task.recurrence);
    if (!nx || (task.recurrenceEndDate && nx > task.recurrenceEndDate)) break;
    cur = nx; safety++;
  }
  return dates;
}

function getSeriesStart(task) {
  // Data d'inici de la sèrie: createdAt > startDate > endDate
  if (task.createdAt?.toDate) return ymd(task.createdAt.toDate());
  if (task.startDate) return task.startDate;
  return task.endDate || today;
}

function getPeriodDays(seriesStart, period) {
  const start = new Date(seriesStart + 'T12:00');
  const end = new Date(seriesStart + 'T12:00');
  if (period==='1m') end.setMonth(end.getMonth()+1);
  else if (period==='3m') end.setMonth(end.getMonth()+3);
  else end.setFullYear(end.getFullYear()+1);
  const days = [];
  const d = new Date(start);
  while (d <= end) { days.push(ymd(d)); d.setDate(d.getDate()+1); }
  return days;
}

function SeguimentView({tasks, completionLogs, lists}) {
  const [period, setPeriod] = useState('1m');

  // Agrupa tasques seguides per seriesId (o per id si no és sèrie)
  const trackedAll = tasks.filter(t=>t.tracked);
  // Deduplicar per sèrie: un representant per seriesId
  const seriesMap = {};
  trackedAll.forEach(t => {
    const key = t.seriesId || t.id;
    if (!seriesMap[key]) seriesMap[key] = { rep: t, instances: [] };
    seriesMap[key].instances.push(t);
  });
  const seriesList = Object.values(seriesMap);

  const taskData = seriesList.map(({ rep, instances }) => {
    const seriesStart = getSeriesStart(rep);
    const days = getPeriodDays(seriesStart, period);
    const startStr = days[0];
    const endStr   = days[days.length-1];

    // Potencials: instàncies dins del rang
    const potentialDates = new Set(
      instances.filter(t=>t.endDate>=startStr&&t.endDate<=endStr).map(t=>t.endDate)
    );
    // Completions: instàncies completades dins del rang
    const completedDates = new Set(
      instances.filter(t=>t.status==='completada'&&t.endDate>=startStr&&t.endDate<=endStr).map(t=>t.endDate)
    );

    const logsForHeatmap = {};
    potentialDates.forEach(d => {
      if (completedDates.has(d))  logsForHeatmap[d] = 1;
      else if (d < today)         logsForHeatmap[d] = -1;
      else                        logsForHeatmap[d] = 0.5;
    });

    return { task: rep, days, occCount: potentialDates.size, compCount: completedDates.size, logsForHeatmap };
  });

  if (seriesList.length===0) return (
    <div className="seg-wrap">
      <div style={{marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:16,fontWeight:600}}>Seguiment de tasques</span>
      </div>
      <div className="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <p>Cap tasca en seguiment.<br/>Fes clic al 🔖 d'una tasca per afegir-la al seguiment.</p>
      </div>
    </div>
  );

  return (
    <div className="seg-wrap">
      <div style={{marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <span style={{fontSize:16,fontWeight:600}}>Seguiment de tasques</span>
        <div className="seg-period">
          {[['1m','1 mes'],['3m','3 mesos'],['1y','1 any']].map(([v,l])=>(
            <button key={v} className={`filter-chip ${period===v?'active':''}`} onClick={()=>setPeriod(v)}>{l}</button>
          ))}
        </div>
      </div>

      <div className="stats-cards">
        <div className="stats-card">
          <div className="stats-card-num" style={{color:'var(--warn)'}}>{seriesList.length}</div>
          <div className="stats-card-label">Tasques seguides</div>
        </div>
      </div>

      {taskData.map(({task, days, occCount, compCount, logsForHeatmap, seriesStart, endStr})=>{
        const list = lists.find(l=>l.id===task.listId);
        const color = list?.color||'var(--accent)';
        const recLabel = RECURRENCE_OPTIONS.find(r=>r.value===task.recurrence&&task.recurrence!=='none')?.label;
        return (
          <div key={task.id} className="tracked-card">
            <div className="tracked-task-header">
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span className={`priority-dot p-${task.priority}`}/>
                <span style={{fontSize:14,fontWeight:500}}>{task.title}</span>
                {list&&<span style={{fontSize:11,color:list.color}}>{list.name}</span>}
                {recLabel&&<span className="recurrence-chip">🔁 {recLabel}</span>}
              </div>
              <span style={{fontSize:12,fontWeight:600,color:'var(--text2)',flexShrink:0}}>
                {compCount}/{occCount} · {occCount>0?Math.round(compCount/occCount*100):0}%
              </span>
            </div>
            <Heatmap days={days} logs={logsForHeatmap} color={color} period={period}/>
          </div>
        );
      })}
    </div>
  );
}

function Heatmap({days, logs, color, period}) {
  // logs[d]: 1=completat, 0.5=pendent/futur, -1=perdut, undefined=no programat
  const sqColor = (d) => {
    const v = logs[d];
    if (v===1)   return {bg:color,     op:1,    title:'Completat'};
    if (v===-1)  return {bg:'var(--danger)', op:0.5, title:'No completat'};
    if (v===0.5) return {bg:color,     op:0.25, title:'Programat'};
    return              {bg:'var(--border)',  op:0.2,  title:'—'};
  };

  if (period==='1m') {
    return (
      <div>
        <div style={{display:'flex',gap:2,flexWrap:'wrap',marginBottom:4}}>
          {days.map(d=>{
            const {bg,op,title} = sqColor(d);
            return <div key={d} className="heatmap-sq" title={`${fmt(d)}: ${title}`}
              style={{width:16,height:16,background:bg,opacity:op}}/>;
          })}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text3)',marginTop:2}}>
          <span>{fmt(days[0])}</span><span>{fmt(days[days.length-1])}</span>
        </div>
      </div>
    );
  }
  // Group into weeks (Mon-start)
  const weeks = [];
  let week = [];
  const startDow = (new Date(days[0]+'T12:00').getDay()+6)%7;
  for (let i=0;i<startDow;i++) week.push(null);
  days.forEach(d=>{
    week.push(d);
    if (week.length===7) { weeks.push(week); week=[]; }
  });
  if (week.length>0) weeks.push(week);

  const sq = period==='1y'?10:13;
  return (
    <div style={{overflowX:'auto'}}>
      <div style={{display:'flex',gap:2,minWidth:'max-content'}}>
        {weeks.map((w,wi)=>(
          <div key={wi} style={{display:'flex',flexDirection:'column',gap:2}}>
            {w.map((d,di)=>{
              if (!d) return <div key={di} style={{width:sq,height:sq}}/>;
              const {bg,op,title} = sqColor(d);
              return <div key={d} className="heatmap-sq" title={`${fmt(d)}: ${title}`}
                style={{width:sq,height:sq,background:bg,opacity:op}}/>;
            })}
          </div>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text3)',marginTop:3}}>
        <span>{fmt(days[0])}</span><span>{fmt(days[days.length-1])}</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
