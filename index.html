  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f6fb;--bg2:#eaecf5;--bg3:#d8dcee;
      --sidebar:#ffffff;--card:#ffffff;--card-hover:#f0f2fa;--border:#dde0f0;
      --accent:#4f8ef7;--accent2:#6fa3ff;
      --text:#1a1a3e;--text2:#5555aa;--text3:#9999cc;
      --danger:#f7604f;--success:#4fbe96;--warn:#f7b74f;
    }
    [data-theme="dark"]{
      --bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;
      --sidebar:#12122a;--card:#1e1e38;--card-hover:#252545;--border:#2a2a4a;
      --text:#e8e8f0;--text2:#9999bb;--text3:#6666aa;
    }
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
    #root{height:100vh;display:flex}
    .login-screen{flex:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%)}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;text-align:center;width:380px;max-width:95vw;box-shadow:0 20px 60px rgba(79,142,247,.1);display:flex;flex-direction:column;align-items:center}
    .login-logo{font-size:40px;margin-bottom:8px}
    .login-card h1{font-size:24px;font-weight:600;margin-bottom:6px}
    .login-card>p{font-size:14px;color:var(--text2);margin-bottom:24px}
    .login-link{background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0}
    .login-link:hover{color:var(--accent)}
    .login-note{font-size:11px;color:var(--text3);margin-top:16px}
    .loading-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .sidebar{width:240px;min-width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
    @media(max-width:768px){
      .sidebar{position:fixed;left:0;top:0;height:100vh;z-index:200;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.18);min-width:240px}
      .sidebar.open{transform:translateX(0)}
      .sidebar-backdrop.open{display:block!important}
      .hamburger{display:flex!important}
      .topbar{padding:10px 14px;gap:6px}
      .topbar-title{font-size:14px}
      .view-toggle{gap:1px}
      .view-btn{padding:5px 9px;font-size:0;gap:0}
      .view-btn span{display:inline-flex!important;width:14px;height:14px}
      .search-box{width:96px}
      .topbar .btn-ghost{display:none}
      .topbar .btn-primary{display:none}
      .fab-new{display:flex!important;align-items:center;justify-content:center;position:fixed;right:18px;bottom:calc(20px + env(safe-area-inset-bottom,0px));width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;box-shadow:0 6px 22px rgba(0,0,0,.32);z-index:150;cursor:pointer}
      .fab-new svg{width:26px;height:26px}
      .fab-voice{display:flex!important;align-items:center;justify-content:center;position:fixed;right:calc(18px + 56px + 12px);bottom:calc(23px + env(safe-area-inset-bottom,0px));width:50px;height:50px;border-radius:50%;background:var(--card);color:var(--text2);border:1px solid var(--border);box-shadow:0 6px 18px rgba(0,0,0,.25);z-index:150;cursor:pointer;font-size:21px}
      .fab-voice.listening{background:var(--danger);color:#fff;border-color:var(--danger)}
    }
    .fab-new{display:none}
    .fab-voice{display:none}
    .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:199}
    .hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px 6px;color:var(--text2);font-size:22px;line-height:1;align-items:center;justify-content:center}
    .sidebar-header{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .sidebar-logo{font-size:17px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px}
    .sidebar-logo svg{width:18px;height:18px}
    .sidebar-user{padding:10px;border-bottom:1px solid var(--border)}
    .sidebar-user-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .sidebar-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:white;background:var(--accent)}
    .sidebar-user-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .btn-logout{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:7px 10px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s}
    .btn-logout:hover{background:rgba(247,96,79,.08);border-color:var(--danger);color:var(--danger)}
    .btn-logout svg{width:13px;height:13px}
    .sidebar-section{padding:10px 8px 4px}
    .sidebar-section-title{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:0 8px;margin-bottom:4px}
    .sidebar-group-label{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;padding:8px 10px 2px;opacity:.75}
    .group-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 8px 8px}
    .group-chip{font-size:11px;padding:3px 9px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
    .group-chip:hover{color:var(--text2);border-color:var(--text3)}
    .group-chip.active{background:rgba(79,142,247,.15);color:var(--accent);border-color:var(--accent)}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;user-select:none}
    .sidebar-item:hover{background:var(--card-hover);color:var(--text)}
    .sidebar-item.active{background:rgba(79,142,247,.12);color:var(--accent);font-weight:500}
    .sidebar-item .badge{margin-left:auto;background:var(--bg3);color:var(--text2);font-size:11px;padding:1px 6px;border-radius:10px}
    .sidebar-item.active .badge{background:rgba(79,142,247,.2);color:var(--accent)}
    .sidebar-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .sidebar-gear{opacity:1;cursor:pointer;color:var(--text2);transition:all .15s;flex-shrink:0;padding:2px}
    .sidebar-gear:hover{color:var(--accent)}
    .sidebar-item.active .sidebar-gear{opacity:.6}
    .add-list-btn{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text3);background:none;border:none;font-family:inherit;width:100%;transition:all .15s}
    .add-list-btn:hover{background:var(--card-hover);color:var(--text)}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .topbar{padding:13px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg);position:relative;z-index:10;overflow:hidden}
    .topbar-title{font-size:17px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;max-width:240px}
    .view-toggle{display:flex;gap:2px;background:var(--bg2);border-radius:8px;padding:3px;margin-right:auto}
    .view-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px}
    .view-btn svg{width:13px;height:13px}
    .view-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .search-box{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:0 8px;height:32px;width:190px;flex-shrink:0}
    .search-box-icon{width:14px;height:14px;color:var(--text3);display:flex;flex-shrink:0}
    .search-box-icon svg{width:14px;height:14px}
    .search-box input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--text);font-size:12px;font-family:inherit}
    .search-box input::placeholder{color:var(--text3)}
    .search-box-clear{display:flex;align-items:center;justify-content:center;width:16px;height:16px;flex-shrink:0;background:none;border:none;color:var(--text3);cursor:pointer;padding:0}
    .search-box-clear svg{width:12px;height:12px}
    .search-box-clear:hover{color:var(--text)}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent2)}
    .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
    .btn-ghost:hover{background:var(--card-hover);color:var(--text)}
    .btn-icon{padding:7px;border-radius:8px}
    .btn svg,.btn-icon svg{width:15px;height:15px;flex-shrink:0}
    .btn-danger-soft{background:transparent;color:var(--danger);border:1px solid transparent}
    .btn-danger-soft:hover{background:rgba(247,96,79,.1);border-color:var(--danger)}
    .filters{padding:8px 24px;display:flex;gap:6px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
    .filter-chip{padding:3px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:transparent;transition:all .15s;font-family:inherit}
    .filter-chip:hover{border-color:var(--accent);color:var(--accent)}
    .filter-chip.active{background:rgba(79,142,247,.12);border-color:var(--accent);color:var(--accent)}
    .filter-sep{color:var(--text3);font-size:12px;margin:0 2px}
    .more-filters{position:relative}
    .more-filters-panel{position:absolute;top:calc(100% + 6px);left:0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;min-width:200px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;flex-direction:column;gap:10px}
    .more-filters-panel label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);display:block;margin-bottom:4px}
    .content{flex:1;overflow-y:auto;padding:14px 24px}
    /* matrix view */
    .matrix-view{flex:1;overflow:auto;padding:14px 24px}
    .matrix-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
    .matrix-table th,.matrix-table td{border:1px solid var(--border);padding:8px;vertical-align:top;text-align:left}
    .matrix-table th{background:var(--bg2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);position:sticky;top:0;z-index:1;text-align:center}
    .matrix-table th:first-child,.matrix-table td:first-child{width:160px}
    .matrix-row-label{display:flex;align-items:center;gap:6px;font-weight:600}
    .matrix-task-chip{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:12px;font-weight:700;transition:filter .12s;border:1px solid transparent}
    .matrix-task-chip:hover{filter:brightness(1.15)}
    .matrix-task-chip.selected{border-color:var(--accent)}
    .matrix-task-chip.completada{opacity:.5;text-decoration:line-through}
    .matrix-empty-cell{color:var(--text3);font-size:11px;font-style:italic}
    .task-group-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin:14px 0 7px}
    .task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;background:var(--card);border:1px solid var(--border);margin-bottom:5px;cursor:pointer;transition:all .15s;animation:fadeIn .15s ease}
    .task-item:hover{border-color:var(--accent);background:var(--card-hover)}
    .task-item.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,142,247,.15)}
    .task-item.done{opacity:.5}
    .task-item.done .task-title{text-decoration:line-through;color:var(--text3)}
    .task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .task-check:hover{border-color:var(--accent)}
    .task-check.checked{background:var(--success);border-color:var(--success)}
    .task-check.checked svg{display:block}
    .task-check svg{display:none;width:10px;height:10px;color:white}
    .task-body{flex:1;min-width:0}
    .task-title{font-size:15px;font-weight:700;margin-bottom:4px}
    .task-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .task-meta-item{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text3)}
    .task-meta-item svg{width:11px;height:11px}
    .priority-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .p-alta{background:var(--danger)}.p-mitjana{background:var(--warn)}.p-baixa{background:var(--success)}
    .tag{padding:1px 7px;border-radius:10px;font-size:11px;font-weight:500}
    .status-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
    .s-pendent{background:rgba(153,153,187,.12);color:var(--text2)}
    .s-en-curs{background:rgba(79,142,247,.12);color:var(--accent)}
    .s-completada{background:rgba(79,190,150,.12);color:var(--success)}
    .progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px}
    .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
    /* task actions */
    .task-actions{display:flex;gap:3px;flex-shrink:0;align-items:center;margin-top:1px}
    .delay-btn{padding:2px 6px;border-radius:5px;font-size:10px;font-weight:700;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .12s;white-space:nowrap;line-height:1.6}
    .delay-btn:hover{border-color:var(--warn);color:var(--warn);background:rgba(247,183,79,.08)}
    .track-btn{padding:4px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;color:var(--text2)}
    .track-btn:hover{color:var(--accent)}
    .track-btn.on{color:var(--accent)}
    .track-btn svg{width:13px;height:13px}
    .recurrence-chip{font-size:10px;padding:1px 5px;border-radius:8px;background:rgba(79,190,150,.12);color:var(--success);font-weight:500}
    /* detail panel */
    .detail-panel{width:340px;min-width:340px;border-left:1px solid var(--border);background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto}
    .detail-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .detail-header h3{font-size:14px;font-weight:600}
    .detail-body{padding:16px;display:flex;flex-direction:column;gap:12px}
    .detail-field label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:5px}
    .detail-field label svg{width:11px;height:11px;vertical-align:-1px;margin-right:3px}
    .detail-title-input{width:100%;background:transparent;border:none;color:var(--text);font-size:15px;font-weight:600;font-family:inherit;outline:none;padding:0}
    .detail-desc{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;padding:9px 11px;resize:vertical;min-height:60px;outline:none}
    .detail-desc:focus{border-color:var(--accent)}
    .detail-select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;padding:7px 10px;outline:none;cursor:pointer}
    .detail-select:focus{border-color:var(--accent)}
    .detail-date{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;padding:7px 10px;outline:none}
    .detail-date:focus{border-color:var(--accent)}
    .detail-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;padding:7px 10px;outline:none}
    .detail-input:focus{border-color:var(--accent)}
    .contact-picker{position:relative}
    .contact-picker-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--text3);font-size:13px;line-height:1;padding:4px}
    .contact-picker-clear:hover{color:var(--text)}
    .contact-picker-list{position:absolute;z-index:20;top:calc(100% + 4px);left:0;right:0;max-height:220px;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
    .contact-picker-item{padding:7px 10px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;gap:8px;align-items:center}
    .contact-picker-item:hover{background:var(--bg2)}
    .contact-picker-item-phone{color:var(--text3);font-size:11px;flex-shrink:0}
    .contact-picker-empty{padding:8px 10px;font-size:12px;color:var(--text3)}
    .contact-picker-clearall{padding:7px 10px;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:1px solid var(--border)}
    .contact-picker-clearall:hover{background:var(--bg2)}
    .att-title-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-weight:600;font-family:inherit;padding:4px 7px;outline:none}
    .att-title-input:focus{border-color:var(--accent)}
    .detail-checkbox{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
    .custom-fields-section{border-top:1px solid var(--border);padding-top:12px}
    .custom-fields-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .custom-fields-title span{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)}
    .tag-input-wrap{display:flex;flex-wrap:wrap;gap:5px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 8px}
    .tag-input-wrap:focus-within{border-color:var(--accent)}
    .tag-input{background:transparent;border:none;outline:none;color:var(--text);font-size:12px;font-family:inherit;flex:1;min-width:60px}
    .tag-pill{display:flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:500}
    .tag-pill button{background:none;border:none;cursor:pointer;color:inherit;opacity:.6;padding:0;font-size:13px;line-height:1}

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const uid = () => Math.random().toString(36).slice(2,10);
// Converteix un color hex (#rrggbb) en rgba amb l'opacitat indicada, per a fons difuminats
const hexToRgba = (hex,alpha=0.15) => {
  if (!hex) return `rgba(79,142,247,${alpha})`;
  const h = hex.replace('#','');
  const r = parseInt(h.length===3?h[0]+h[0]:h.substring(0,2),16);
  const g = parseInt(h.length===3?h[1]+h[1]:h.substring(2,4),16);
  const b = parseInt(h.length===3?h[2]+h[2]:h.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
};
const TAG_COLORS = [
  {bg:'rgba(79,142,247,.15)',text:'#4f8ef7'},{bg:'rgba(79,190,150,.15)',text:'#4fbe96'},
  {bg:'rgba(247,183,79,.15)',text:'#f7b74f'},{bg:'rgba(247,96,79,.15)',text:'#f7604f'},
  {bg:'rgba(175,79,247,.15)',text:'#af4ff7'},{bg:'rgba(79,215,247,.15)',text:'#4fd7f7'},
];
const LIST_COLORS = ['#4f8ef7','#4fbe96','#f7b74f','#f7604f','#af4ff7','#4fd7f7','#ff8fab','#a8e6cf'];
// Grups predefinits per organitzar les llistes (es poden ampliar des del modal de llista)
const LIST_GROUPS = ['Professional','Personal'];

];
// ── Notificacions push (Web Push + VAPID) ──────────────────────────────────
const VAPID_PUBLIC_KEY = 'BIPqnC-UD_KutAs0wlpackJLHEfbsORT0Ra-DUDWbNd9bXTqpO23o6whWeIwbgsP3ySst_NYfHLfxCdpiCaYRLE';
const urlBase64ToUint8Array = (b64) => {
  const padding = '='.repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i=0;i<raw.length;i++) arr[i] = raw.charCodeAt(i);
  return arr;
};
const pushSupported = () => ('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window);
async function subscribeToPush(uid, email) {
  if (!pushSupported()) throw new Error('unsupported');
  const reg = await navigator.serviceWorker.register('sw.js');
  await navigator.serviceWorker.ready;
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') throw new Error('denied');
  let sub = await reg.pushManager.getSubscription();
  if (!sub) {
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
  }
  await db.collection('pushSubscriptions').doc(uid).set({
    uid, email: email||'',
    subscription: JSON.parse(JSON.stringify(sub)),
    userAgent: navigator.userAgent,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  return sub;
}
async function unsubscribeFromPush(uid) {
  try {
    const reg = await navigator.serviceWorker.getRegistration();
    if (reg) {
      const sub = await reg.pushManager.getSubscription();
      if (sub) await sub.unsubscribe();
    }
  } catch (e) {}
  try { await db.collection('pushSubscriptions').doc(uid).delete(); } catch (e) {}
}
async function isPushActive() {
  if (!pushSupported() || Notification.permission !== 'granted') return false;
  try {
    const reg = await navigator.serviceWorker.getRegistration();
    if (!reg) return false;
    const sub = await reg.pushManager.getSubscription();
    return !!sub;
  } catch (e) { return false; }
}
// Registra el service worker a l'arrencada: cau network-first + detectar estat de notificacions
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}

const REMINDER_OPTIONS = [
  {value:0,label:'Sense recordatori'},

  {value:60,label:'1 hora abans'},
  {value:120,label:'2 hores abans'},

const tagColor = t => TAG_COLORS[Math.abs([...t].reduce((a,c)=>a+c.charCodeAt(0),0))%TAG_COLORS.length];
const fmt = d => d ? new Date(d+'T12:00').toLocaleDateString('ca-ES',{day:'2-digit',month:'short'}) : '';
// Format per a la vista Llista: "dl, 13 de juliol" (dia de la setmana abreujat sense punt, dia i mes complet)
const fmtList = d => d ? new Date(d+'T12:00').toLocaleDateString('ca-ES',{weekday:'short',day:'numeric',month:'long'}).replace('.','') : '';
// YYYY-MM-DD en hora local (evita el desfasament de toISOString amb fusos horaris)
const ymd = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const today = ymd(new Date());
const isOverdue = t => t.endDate && t.endDate < today && t.status !== 'completada';
const tomorrowStr = (() => { const d=new Date(); d.setDate(d.getDate()+1); return ymd(d); })();
const threeDayLaterStr = (() => { const d=new Date(); d.setDate(d.getDate()+3); return ymd(d); })();
const weekLaterStr = (() => { const d=new Date(); d.setDate(d.getDate()+7); return ymd(d); })();
// Data "representativa" d'una tasca per filtres ràpids (Avui/Demà/Pròxims dies):
// per ocurrències de sèries repetides és la pròpia ocurrència (endDate); per la resta, endDate o startDate.
const taskDueStr = t => t.seriesId ? t.endDate : (t.endDate || t.startDate || '');
// Vistes ràpides per data, mostrades a la barra lateral sota "Avui"
const DATE_QUICK_VIEWS = ['today','tomorrow','next3','next7'];
// ─── PLANTILLA DE SUBTASQUES PER ETIQUETA (AuditGDP) ───────────────────────
// Suma/resta dies naturals a una data YYYY-MM-DD
const addDays = (dateStr, n) => { const d=new Date(dateStr+'T12:00'); d.setDate(d.getDate()+n); return ymd(d); };
// Suma/resta setmanes naturals (1 setmana = 7 dies)
const addWeeks = (dateStr, n) => addDays(dateStr, n*7);
// Suma/resta mesos naturals
const addMonths = (dateStr, n) => { const d=new Date(dateStr+'T12:00'); d.setMonth(d.getMonth()+n); return ymd(d); };
// Suma/resta dies laborables (dilluns-divendres, sense festius)
const addBusinessDays = (dateStr, n) => {
  const d = new Date(dateStr+'T12:00');
  let remaining = Math.abs(n), step = n>=0?1:-1;
  while (remaining>0) { d.setDate(d.getDate()+step); const dow=d.getDay(); if(dow!==0&&dow!==6) remaining--; }
  return ymd(d);
};
// Nom del camp personalitzat (a la llista "Auditorias") que porta la data de l'auditoria
const AUDIT_DATE_FIELD_NAME = 'data auditoria';
const AUDITGDP_TAG = 'auditgdp';
const findAuditDateField = list => (list?.fields||[]).find(f=>f.type==='date'&&f.name.trim().toLowerCase()===AUDIT_DATE_FIELD_NAME);

// sowDate = data de creació de la tasca ("Data SOW"); auditDate = data de l'auditoria.
const buildAuditGdpSubtasks = (auditDate, sowDate) => {
  if (!auditDate) return [];
  const mk = (title, start, due) => ({id:uid(), title, done:false, start, due});
  return [
    mk('Auditoria',                    auditDate, auditDate),
    mk('Hacer Carpetas con estructura', sowDate,  sowDate),
    mk('Plan del viaje',               addWeeks(auditDate,-5), addWeeks(auditDate,-4)),
    mk('Revisar agenda',               addWeeks(sowDate,1),    addWeeks(sowDate,1)),
    mk('Revisar doc',                  addWeeks(auditDate,-1), addWeeks(auditDate,-1)),
    mk('Report',                       addBusinessDays(auditDate,7), addBusinessDays(auditDate,7)),
    mk('Gastos',                       addBusinessDays(auditDate,2), addBusinessDays(auditDate,2)),
    mk('Revision report',              addWeeks(auditDate,1),  addWeeks(auditDate,1)),
    mk('Facturacion',                  addWeeks(auditDate,4),  addWeeks(auditDate,4)),
  ];
};
// Aplica la plantilla AuditGDP a les dades d'una tasca nova si porta l'etiqueta i ja te la data
// d'auditoria omplerta, sense sobreescriure subtasques o dates que l'usuari ja hagi posat.
const applyAuditGdpTemplate = (data, lists) => {
  const tags = (data.tags||[]).map(t=>String(t).toLowerCase());
  if (!tags.includes(AUDITGDP_TAG)) return data;
  const list = lists.find(l=>l.id===data.listId);

  if ((data.subtasks||[]).length>0) return data; // ja en te, no ho toquem
  const sowDate = data.startDate || today;

const loadGcalToken = () => {

// Converteix un dateTime ISO de l'API de Google (pot venir en UTC amb "Z" o amb offset) a "HH:MM" en hora local.
const gcalDateTimeToLocalHHMM = dt => {
  if (!dt) return '';
  const d = new Date(dt);
  if (isNaN(d)) return '';
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};
// Converteix un esdeveniment de l'API de Google Calendar a {dateStr, title, allDay, time}
const gcalEventToDays = (ev, cal) => {
  const days = [];
  const startStr = ev.start?.date || (ev.start?.dateTime||'').slice(0,10);
  const endStr   = ev.end?.date   || (ev.end?.dateTime||'').slice(0,10);
  if (!startStr) return days;
  const allDay = !!ev.start?.date;
  // Esdeveniments de tot el dia: l'end de Google és exclusiu
  let cur = new Date(startStr+'T00:00');
  const end = new Date((endStr||startStr)+'T00:00');
  if (allDay && end>cur) end.setDate(end.getDate()-1);
  let safety=0;
  while (cur<=end && safety<60) {
    days.push(ymd(cur));
    cur.setDate(cur.getDate()+1);
    safety++;
  }
  if (days.length===0) days.push(startStr);
  return days.map(dateStr=>({
    dateStr, title:ev.summary||'(sense títol)', allDay,
    time: allDay?'':gcalDateTimeToLocalHHMM(ev.start?.dateTime),
    link: ev.htmlLink,
    color: cal?.color||'#4f8ef7', calLabel: cal?.label||'Google Calendar'
  }));
};
const fetchGcalEvents = async (token, calendarId, timeMinStr, timeMaxStr, cal) => {
  const params = new URLSearchParams({
    timeMin: new Date(timeMinStr+'T00:00:00').toISOString(),
    timeMax: new Date(timeMaxStr+'T23:59:59').toISOString(),
    singleEvents:'true', orderBy:'startTime', maxResults:'250'
  });
  const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?${params}`,{
    headers:{Authorization:`Bearer ${token}`}
  });
  if (!res.ok) { if(res.status===401) clearGcalToken(); throw new Error('gcal-fetch-failed'); }
  const data = await res.json();
  return (data.items||[]).filter(ev=>ev.status!=='cancelled').flatMap(ev=>gcalEventToDays(ev, cal));
};

const dateCategory = t => {
  if (!t.endDate) return 'nodate';
  if (t.endDate < today) return 'overdue';
  if (t.endDate === today) return 'today';
  if (t.endDate === tomorrowStr) return 'tomorrow';
  if (t.endDate <= weekLaterStr) return 'soon';
  return 'later';
};
// Igual que dateCategory pero per a un dia concret (string YYYY-MM-DD), no per a una tasca sencera.
const dateCategoryForDay = d => {
  if (!d) return 'nodate';
  if (d < today) return 'overdue';
  if (d === today) return 'today';
  if (d === tomorrowStr) return 'tomorrow';
  if (d <= weekLaterStr) return 'soon';
  return 'later';
};
// Totes les categories (Avui/Demà/Pròxims 7 dies/Més endavant) que travessa una tasca de diversos dies,
// perquè aparegui repetida a cada bloc pel qual passi. Les tasques ja vençudes (per isOverdue) només
// surten al bloc "Vençudes", igual que abans. Els dies ja passats d'una tasca en curs no compten.
const taskDateCategories = t => {
  if (isOverdue(t)) return ['overdue'];
  if (!t.startDate && !t.endDate) return ['nodate'];
  // Una ocurrència de sèrie repetida no és una tasca "de diversos dies": la seva startDate és la
  // data d'inici original de la sèrie (igual a totes les ocurrències), no l'inici d'aquesta ocurrència.
  if (t.seriesId) return [dateCategoryForDay(t.endDate||t.startDate)];
  const start = t.startDate || t.endDate, end = t.endDate || t.startDate;
  if (start === end) return [dateCategoryForDay(end)];
  const from = start < today ? today : start;
  const cats = new Set();
  let cur = new Date(from+'T12:00'); const endD = new Date(end+'T12:00'); let safety = 0;
  while (cur <= endD && safety < 400) { cats.add(dateCategoryForDay(ymd(cur))); cur.setDate(cur.getDate()+1); safety++; }
  return cats.size ? [...cats] : [dateCategoryForDay(end)];
};
const DATE_GROUPS = [
  { key:'overdue',  label:'Vençudes',       dot:'var(--danger)',  cls:'date-overdue'  },
  { key:'today',    label:'Avui',           dot:'var(--warn)',    cls:'date-today'    },
  { key:'tomorrow', label:'Demà',           dot:'var(--accent)',  cls:'date-tomorrow' },

// Per a les vistes ràpides "Pròxims 3/7 dies": agrupa cada dia per separat
// (Avui / Demà / nom del dia) en lloc de fer servir les categories genèriques de DATE_GROUPS.
const dayGroupLabel = dateStr => {
  if (dateStr===today) return 'Avui';
  if (dateStr===tomorrowStr) return 'Demà';
  if (!dateStr) return 'Sense data';
  const d = new Date(dateStr+'T12:00');
  const label = d.toLocaleDateString('ca-ES',{weekday:'long',day:'numeric',month:'long'});
  return label.charAt(0).toUpperCase()+label.slice(1);
};
const dayGroupDot = dateStr => dateStr===today?'var(--warn)':dateStr===tomorrowStr?'var(--accent)':!dateStr?'var(--border)':'var(--text2)';
// Agrupa una llista de tasques per dia concret dins la finestra [avui, maxDateStr], repetint les tasques
// de diversos dies a cada dia intermedi que travessin (l'ordre dins de cada dia respecta l'ordre d'entrada).
const buildDayGroups = (list, maxDateStr) => {
  const map = new Map();
  const push = (d,t) => { const arr = map.get(d)||[]; arr.push(t); map.set(d,arr); };
  list.forEach(t=>{
    const due = taskDueStr(t);
    const start = t.startDate || t.endDate;
    const end = t.endDate || t.startDate;
    if (!start && !end) { push('', t); return; }
    // Ocurrència de sèrie repetida: la startDate és la de la sèrie sencera, no d'aquesta ocurrència.
    if (t.seriesId || start === end || !start || !end) { push(due||end||start, t); return; }
    let from = start < today ? today : start;
    let to = end > maxDateStr ? maxDateStr : end;
    if (from > to) { push(due||end, t); return; }
    let cur = new Date(from+'T12:00'); const endD = new Date(to+'T12:00'); let safety = 0;
    while (cur <= endD && safety < 400) { push(ymd(cur), t); cur.setDate(cur.getDate()+1); safety++; }
  });
  return [...map.keys()].sort().map(d=>({key:d||'nodate',label:dayGroupLabel(d),dot:dayGroupDot(d),tasks:map.get(d)}));
};

// Normalitza text per a cerca sense distinció d'accents/majúscules (p. ex. pel buscador de contactes)
const normText = s => {
  const str = (s||'').normalize('NFD');
  let out = '';
  for (let i=0;i<str.length;i++){
    const code = str.charCodeAt(i);
    if (code>=0x0300 && code<=0x036f) continue; // marques diacritiques combinades
    out += str[i];
  }
  return out.toLowerCase();
};

const nextOccurrence = (dateStr, recurrence) => {
  const d = new Date(dateStr + 'T12:00');
  switch(recurrence) {
    case 'daily': d.setDate(d.getDate()+1); break;
    case 'weekly': d.setDate(d.getDate()+7); break;
    case 'monthly': d.setMonth(d.getMonth()+1); break;
    case 'monthly4w': d.setDate(d.getDate()+28); break;
    case 'yearly': d.setFullYear(d.getFullYear()+1); break;
    case 'weekdays':
      do { d.setDate(d.getDate()+1); } while ([0,6].includes(d.getDay()));
      break;
    default: return null;
  }
  return ymd(d);
};

function LoginScreen() {
  const [mode,setMode]         = useState('login');
  const [email,setEmail]       = useState('');
  const [password,setPassword] = useState('');
  const [confirm,setConfirm]   = useState('');
  const [loading,setLoading]   = useState(false);
  const [error,setError]       = useState('');
  const [info,setInfo]         = useState('');
  const reset = () => { setError(''); setInfo(''); };
  const submit = async () => {
    reset(); setLoading(true);
    try {
      if (mode==='login') {
        await auth.signInWithEmailAndPassword(email, password);
      } else if (mode==='register') {
        if (password!==confirm) { setError('Les contrasenyes no coincideixen.'); setLoading(false); return; }
        if (password.length<6)  { setError('Mínim 6 caràcters.'); setLoading(false); return; }
        await auth.createUserWithEmailAndPassword(email, password);
      } else {
        await auth.sendPasswordResetEmail(email);
        setInfo('Correu de recuperació enviat!'); setLoading(false); return;
      }
    } catch(e) {
      const msgs = {
        'auth/user-not-found':'No existeix cap compte amb aquest correu.',
        'auth/wrong-password':'Contrasenya incorrecta.',
        'auth/email-already-in-use':'Aquest correu ja està registrat.',
        'auth/invalid-email':'Correu no vàlid.',
        'auth/too-many-requests':'Massa intents. Espera uns minuts.',
        'auth/invalid-credential':'Correu o contrasenya incorrectes.',
      };
      setError(msgs[e.code]||e.message);
    }
    setLoading(false);
  };
  const titles = {login:'Inicia sessió',register:'Crea un compte',reset:'Recupera la contrasenya'};
  return (
    <div className="login-screen">
      <div className="login-card">
        <div className="login-logo">✅</div>
        <h1>Tasques</h1>
        <p>{titles[mode]}</p>
        <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%',marginBottom:12}}>
          <input className="input" type="email" placeholder="Correu electrònic" value={email}
            onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus/>
          {mode!=='reset' && <input className="input" type="password" placeholder="Contrasenya" value={password}
            onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>}
          {mode==='register' && <input className="input" type="password" placeholder="Confirma la contrasenya" value={confirm}
            onChange={e=>setConfirm(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>}
          {error && <p style={{color:'var(--danger)',fontSize:12}}>{error}</p>}
          {info  && <p style={{color:'var(--success)',fontSize:12}}>{info}</p>}
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:10}}
            onClick={submit} disabled={loading}>{loading?'Un moment...':titles[mode]}</button>
        </div>
        {mode==='login' && <>
          <button className="login-link" onClick={()=>{setMode('register');reset();}}>No tens compte? Registra't</button>
          <button className="login-link" style={{marginTop:6}} onClick={()=>{setMode('reset');reset();}}>Has oblidat la contrasenya?</button>
        </>}
        {mode!=='login' && <button className="login-link" onClick={()=>{setMode('login');reset();}}>← Torna a iniciar sessió</button>}
        <p className="login-note">Les teves dades es sincronitzen automàticament</p>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [user,setUser]               = useState(undefined);
  const [tasks,setTasks]             = useState([]);
  // Per a tasques recurrents: propera ocurrencia calculada directament a partir de la regla
  // de recurrencia (no depen de que ja existeixi un altre document de la mateixa serie).
  const nextOccurrenceFor = task => {
    if (!task.recurrence || task.recurrence==='none') return null;
    const base = task.endDate||task.startDate; if (!base) return null;
    const nx = nextOccurrence(base, task.recurrence);
    if (!nx) return null;
    if (task.recurrenceEndDate && nx > task.recurrenceEndDate) return null;
    return {date:nx, time:task.startTime||task.endTime||''};
  };
  const [lists,setLists]             = useState([]);

  const [completionLogs,setCompletionLogs] = useState([]);

  const [allUsers,setAllUsers]             = useState([]); // {uid,email} de tots els usuaris registrats (per al desplegable de "Convida a informar")

  const [toast,setToast]             = useState('');

  const disconnectGoogleCalendar = () => {

  const [gcalCalendars,setGcalCalendars] = useState([

  const [showGcalSettings,setShowGcalSettings] = useState(false);

  const [showModal,setShowModal]         = useState(false);

  const [pushOn,setPushOn]               = useState(false);
  useEffect(()=>{ let alive=true; isPushActive().then(on=>{ if(alive) setPushOn(on); }); return ()=>{alive=false;}; }, [user]);
  const [voiceListening,setVoiceListening] = useState(false);

  useEffect(()=>auth.onAuthStateChanged(u=>{

  useEffect(()=>{setFilterCustom({});setShowMoreFilters(false);},[selectedList]);
  const moreFiltersRef = useRef(null);
  useEffect(()=>{
    if (!showMoreFilters) return;

    document.addEventListener('mousedown',h);

  useEffect(()=>{
    if (!user) return;
    const _ownTasks=[],_sharedTasks=[],_assignedTasks=[],_ownLists=[],_sharedLists=[];
    let sharedTasksUnsub=()=>{};
    const sortTasks=arr=>arr.slice().sort((a,b)=>(b.createdAt?.toMillis?.()??0)-(a.createdAt?.toMillis?.()??0));
    const sortLists=arr=>arr.slice().sort((a,b)=>(a.createdAt?.toMillis?.()??0)-(b.createdAt?.toMillis?.()??0));
    const dedup=arr=>{const s=new Set();return arr.filter(x=>!s.has(x.id)&&s.add(x.id));};
    const mergeTasks=()=>setTasks(sortTasks(dedup([..._ownTasks,..._sharedTasks,..._assignedTasks])));
    const mergeLists=()=>setLists(sortLists(dedup([..._ownLists,..._sharedLists])));
    const unsubT=db.collection('tasks').where('ownerId','==',user.uid)
      .onSnapshot(snap=>{
        _ownTasks.length=0;snap.docs.forEach(d=>_ownTasks.push({id:d.id,...d.data()}));
        mergeTasks();
      });
    // Tasques d'altres persones que m'han assignat a mi (les puc veure i completar, no editar)
    const unsubA=db.collection('tasks').where('assigneeId','==',user.uid)
      .onSnapshot(snap=>{
        _assignedTasks.length=0;snap.docs.forEach(d=>_assignedTasks.push({id:d.id,...d.data()}));
        mergeTasks();
      });
    const unsubL1=db.collection('lists').where('ownerId','==',user.uid)
      .onSnapshot(snap=>{
        _ownLists.length=0;snap.docs.forEach(d=>_ownLists.push({id:d.id,...d.data()}));

    const unsubL2=db.collection('lists').where('sharedWith','array-contains',user.uid)
      .onSnapshot(snap=>{
        _sharedLists.length=0;snap.docs.forEach(d=>_sharedLists.push({id:d.id,...d.data()}));
        mergeLists();
        sharedTasksUnsub();
        const sharedIds=_sharedLists.map(l=>l.id);
        if(!sharedIds.length){_sharedTasks.length=0;mergeTasks();sharedTasksUnsub=()=>{};return;}
        sharedTasksUnsub=db.collection('tasks').where('listId','in',sharedIds)
          .onSnapshot(snap=>{
            _sharedTasks.length=0;snap.docs.forEach(d=>_sharedTasks.push({id:d.id,...d.data()}));

    const unsubS=db.collection('userSettings').doc(user.uid)
      .onSnapshot(snap=>{
